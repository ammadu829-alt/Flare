<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FLARE — Premium Fast Food</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init('OV3RYf_E_Jak1ElyH');</script>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --fire: #FF4500;
      --ember: #FF6B35;
      --gold: #FFD700;
      --cream: #FFF8F0;
      --dark: #0A0805;
      --charcoal: #1A1612;
      --ash: #2D2820;
      --smoke: #4A4035;
      --muted: #8A7A6A;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-accent: 'Playfair Display', serif;
    }

    html { scroll-behavior: smooth; }

    /* ── Bootstrap override — keep FLARE design intact ── */
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: var(--font-body) !important; background: var(--dark) !important; color: var(--cream) !important; overflow-x: hidden; cursor: none; }
    .container, .container-fluid, .container-sm, .container-md, .container-lg, .container-xl { padding-left: 0 !important; padding-right: 0 !important; }
    h1,h2,h3,h4,h5,h6 { font-family: var(--font-display) !important; color: var(--cream) !important; }
    a { color: inherit; text-decoration: none; }
    button { font-family: var(--font-body); }
    img { max-width: 100%; }

    /* Custom cursor */
    .cursor {
      width: 12px; height: 12px;
      background: var(--fire);
      border-radius: 50%;
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.1s ease;
      mix-blend-mode: difference;
    }
    .cursor-follower {
      width: 36px; height: 36px;
      border: 1px solid rgba(255,69,0,0.5);
      border-radius: 50%;
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9998;
      transition: transform 0.15s ease, opacity 0.3s;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--fire); border-radius: 2px; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 24px 60px;
      display: flex; align-items: center; justify-content: space-between;
      transition: background 0.4s, padding 0.4s;
    }
    nav.scrolled {
      background: rgba(10,8,5,0.95);
      backdrop-filter: blur(20px);
      padding: 16px 60px;
      border-bottom: 1px solid rgba(255,69,0,0.15);
    }
    .nav-logo {
      font-family: var(--font-display);
      font-size: 32px;
      letter-spacing: 4px;
      color: var(--cream);
      text-decoration: none;
    }
    .nav-logo span { color: var(--fire); }
    .nav-links { display: flex; gap: 40px; list-style: none; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.3s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 0; height: 1px;
      background: var(--fire);
      transition: width 0.3s;
    }
    .nav-links a:hover { color: var(--cream); }
    .nav-links a:hover::after { width: 100%; }
    .nav-cta {
      background: var(--fire);
      color: white;
      border: none;
      padding: 12px 28px;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: none;
      transition: background 0.3s, transform 0.2s;
    }
    .nav-cta:hover { background: var(--ember); transform: translateY(-1px); }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      overflow: hidden;
    }
    .hero-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 160px 60px 100px;
      position: relative;
      z-index: 2;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,69,0,0.12);
      border: 1px solid rgba(255,69,0,0.3);
      padding: 8px 20px;
      width: fit-content;
      margin-bottom: 40px;
      animation: fadeInUp 0.8s ease forwards;
    }
    .hero-badge-dot {
      width: 6px; height: 6px;
      background: var(--fire);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.5); }
    }
    .hero-badge span {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--fire);
      font-weight: 600;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(72px, 8vw, 120px);
      line-height: 0.9;
      letter-spacing: 2px;
      margin-bottom: 32px;
      animation: fadeInUp 0.8s 0.2s ease both;
    }
    .hero-title-fire { color: var(--fire); display: block; }
    .hero-title-sub {
      font-family: var(--font-accent);
      font-style: italic;
      font-size: clamp(20px, 2.5vw, 36px);
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0;
      display: block;
      margin-top: 8px;
    }
    .hero-desc {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.8;
      max-width: 420px;
      margin-bottom: 56px;
      font-weight: 300;
      animation: fadeInUp 0.8s 0.4s ease both;
    }
    .hero-actions {
      display: flex;
      gap: 20px;
      align-items: center;
      animation: fadeInUp 0.8s 0.6s ease both;
    }
    .btn-primary {
      background: var(--fire);
      color: white;
      border: none;
      padding: 18px 44px;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: none;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.15);
      transition: left 0.4s;
    }
    .btn-primary:hover::before { left: 100%; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 20px 40px rgba(255,69,0,0.4); }
    .btn-ghost {
      background: transparent;
      color: var(--cream);
      border: 1px solid rgba(255,248,240,0.2);
      padding: 18px 44px;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: none;
      transition: all 0.3s;
    }
    .btn-ghost:hover {
      border-color: var(--fire);
      color: var(--fire);
    }
    .hero-stats {
      display: flex;
      gap: 48px;
      margin-top: 72px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,248,240,0.08);
      animation: fadeInUp 0.8s 0.8s ease both;
    }
    .stat-num {
      font-family: var(--font-display);
      font-size: 42px;
      color: var(--fire);
      line-height: 1;
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .hero-right {
      position: relative;
      overflow: hidden;
    }
    .hero-img-main {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scale(1.05);
      animation: kenBurns 12s ease-in-out infinite alternate;
    }
    @keyframes kenBurns {
      from { transform: scale(1.05) translate(0,0); }
      to { transform: scale(1.12) translate(-2%, -2%); }
    }
    .hero-img-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to right, var(--dark) 0%, transparent 30%),
                  linear-gradient(to top, var(--dark) 0%, transparent 40%);
    }
    .hero-float-card {
      position: absolute;
      bottom: 80px;
      right: 40px;
      background: rgba(26,22,18,0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,69,0,0.2);
      padding: 20px 24px;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .float-card-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--fire);
      font-weight: 600;
    }
    .float-card-name {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 1px;
      margin: 6px 0 4px;
    }
    .float-card-price {
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
    }

    /* MARQUEE */
    .marquee-strip {
      background: var(--fire);
      padding: 14px 0;
      overflow: hidden;
      white-space: nowrap;
    }
    .marquee-inner {
      display: inline-block;
      animation: marquee 20s linear infinite;
    }
    .marquee-inner span {
      font-family: var(--font-display);
      font-size: 18px;
      letter-spacing: 4px;
      margin: 0 40px;
      color: white;
    }
    .marquee-dot { color: rgba(255,255,255,0.5); }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* CATEGORIES */
    .section { padding: 120px 60px; }
    .section-tag {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--fire);
      font-weight: 600;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(48px, 6vw, 80px);
      line-height: 0.95;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    .section-title em {
      font-family: var(--font-accent);
      font-style: italic;
      color: var(--fire);
    }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-top: 60px;
    }
    .cat-card {
      position: relative;
      aspect-ratio: 3/4;
      overflow: hidden;
      cursor: none;
      group: true;
    }
    .cat-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .cat-card:hover img { transform: scale(1.08); }
    .cat-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,8,5,0.95) 0%, rgba(10,8,5,0.2) 60%, transparent 100%);
      transition: background 0.4s;
    }
    .cat-card:hover .cat-overlay {
      background: linear-gradient(to top, rgba(255,69,0,0.85) 0%, rgba(10,8,5,0.4) 60%, transparent 100%);
    }
    .cat-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 24px 20px;
    }
    .cat-name {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 2px;
      display: block;
    }
    .cat-count {
      font-size: 11px;
      color: rgba(255,248,240,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
      display: block;
    }

    /* MENU */
    .menu-section { background: var(--charcoal); }
    .menu-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 60px;
    }
    .menu-filters {
      display: flex;
      gap: 8px;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid rgba(255,248,240,0.15);
      color: var(--muted);
      padding: 10px 24px;
      font-family: var(--font-body);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: none;
      transition: all 0.3s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--fire);
      border-color: var(--fire);
      color: white;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .menu-card {
      background: var(--ash);
      overflow: hidden;
      cursor: none;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.4s;
      position: relative;
    }
    .menu-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,69,0,0.3);
    }
    .menu-img-wrap {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
    }
    .menu-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.6s;
    }
    .menu-card:hover .menu-img-wrap img { transform: scale(1.06); }
    .menu-badge {
      position: absolute;
      top: 16px; left: 16px;
      background: var(--fire);
      color: white;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 12px;
    }
    .menu-badge.spicy { background: #c0392b; }
    .menu-badge.new { background: var(--gold); color: var(--dark); }
    .menu-badge.veg { background: #27ae60; }

    .menu-add-btn {
      position: absolute;
      bottom: 16px; right: 16px;
      width: 44px; height: 44px;
      background: var(--dark);
      color: var(--cream);
      border: none;
      font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      cursor: none;
      transition: all 0.3s;
      opacity: 0;
      transform: translateY(8px);
    }
    .menu-card:hover .menu-add-btn {
      opacity: 1;
      transform: translateY(0);
    }
    .menu-add-btn:hover { background: var(--fire); }

    .menu-info { padding: 24px; }
    .menu-category {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--fire);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .menu-name {
      font-family: var(--font-display);
      font-size: 26px;
      letter-spacing: 1px;
      margin-bottom: 10px;
      line-height: 1.1;
    }
    .menu-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 20px;
      font-weight: 300;
    }
    .menu-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid rgba(255,248,240,0.06);
    }
    .menu-price {
      font-size: 24px;
      font-weight: 700;
      color: var(--gold);
    }
    .menu-price span {
      font-size: 14px;
      color: var(--muted);
      text-decoration: line-through;
      margin-right: 8px;
      font-weight: 400;
    }
    .menu-rating {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    .stars { color: var(--gold); font-size: 12px; }

    /* FEATURE STRIP */
    .feature-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid rgba(255,248,240,0.06);
      border-bottom: 1px solid rgba(255,248,240,0.06);
    }
    .feature-item {
      padding: 60px 40px;
      border-right: 1px solid rgba(255,248,240,0.06);
      text-align: center;
      transition: background 0.3s;
    }
    .feature-item:last-child { border-right: none; }
    .feature-item:hover { background: rgba(255,69,0,0.05); }
    .feature-icon {
      font-size: 36px;
      margin-bottom: 20px;
      display: block;
    }
    .feature-title {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
    .feature-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      font-weight: 300;
    }

    /* SPECIALS */
    .specials-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      margin-top: 60px;
    }
    .special-card {
      position: relative;
      height: 500px;
      overflow: hidden;
      cursor: none;
    }
    .special-card:first-child { grid-row: span 2; height: 100%; }
    .special-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .special-card:hover img { transform: scale(1.06); }
    .special-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,8,5,0.9) 0%, transparent 60%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 40px;
      transition: background 0.4s;
    }
    .special-card:hover .special-overlay {
      background: linear-gradient(to top, rgba(255,69,0,0.8) 0%, transparent 70%);
    }
    .special-tag {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 12px;
    }
    .special-name {
      font-family: var(--font-display);
      font-size: 36px;
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 12px;
    }
    .special-price {
      font-size: 22px;
      font-weight: 700;
      color: var(--gold);
    }

    /* TESTIMONIALS */
    .testimonials-section { background: var(--charcoal); }
    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-top: 60px;
    }
    .testimonial-card {
      background: var(--ash);
      padding: 40px;
      position: relative;
      transition: transform 0.3s;
    }
    .testimonial-card:hover { transform: translateY(-4px); }
    .testimonial-card::before {
      content: '"';
      font-family: var(--font-accent);
      font-size: 120px;
      color: rgba(255,69,0,0.1);
      position: absolute;
      top: -10px; left: 20px;
      line-height: 1;
    }
    .testimonial-text {
      font-size: 15px;
      line-height: 1.8;
      color: rgba(255,248,240,0.8);
      margin-bottom: 32px;
      font-weight: 300;
      font-style: italic;
      position: relative;
      z-index: 1;
    }
    .testimonial-author {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .author-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--fire);
    }
    .author-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 2px;
    }
    .author-role {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* CTA */
    .cta-section {
      padding: 140px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .cta-bg {
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1600&q=80') center/cover;
    }
    .cta-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(10,8,5,0.85);
    }
    .cta-content { position: relative; z-index: 1; }
    .cta-title {
      font-family: var(--font-display);
      font-size: clamp(56px, 7vw, 100px);
      letter-spacing: 4px;
      line-height: 0.95;
      margin-bottom: 24px;
    }
    .cta-title em {
      color: var(--fire);
      font-family: var(--font-accent);
      font-style: italic;
    }
    .cta-subtitle {
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 56px;
      font-weight: 300;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    .cta-actions {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    /* FOOTER */
    footer {
      background: var(--dark);
      border-top: 1px solid rgba(255,248,240,0.06);
      padding: 80px 60px 40px;
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 60px;
      margin-bottom: 60px;
    }
    .footer-brand-name {
      font-family: var(--font-display);
      font-size: 40px;
      letter-spacing: 4px;
      margin-bottom: 16px;
    }
    .footer-brand-name span { color: var(--fire); }
    .footer-desc {

    /* ─── eid responsive: in main block ─── */

    /* CART BUBBLE */
    .cart-bubble {
      position: fixed;
      bottom: 40px; right: 40px;
      width: 60px; height: 60px;
      background: var(--fire);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      cursor: none;
      z-index: 200;
      box-shadow: 0 10px 40px rgba(255,69,0,0.5);
      transition: transform 0.3s;
    }
    .cart-bubble:hover { transform: scale(1.1); }
    .cart-count {
      position: absolute;
      top: -4px; right: -4px;
      width: 22px; height: 22px;
      background: var(--gold);
      color: var(--dark);
      border-radius: 50%;
      font-size: 11px;
      font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 120px; right: 40px;
      background: var(--ash);
      border: 1px solid rgba(255,69,0,0.3);
      padding: 16px 24px;
      display: flex; align-items: center; gap: 12px;
      z-index: 300;
      animation: slideIn 0.4s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .toast-icon { font-size: 20px; }
    .toast-text { font-size: 14px; font-weight: 500; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===================== CART DRAWER ===================== */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 400;
      animation: fadeOverlay 0.3s ease;
    }
    @keyframes fadeOverlay { from { opacity:0; } to { opacity:1; } }

    .cart-drawer {
      position: fixed;
      top: 0; right: 0;
      width: 420px; height: 100vh;
      background: var(--charcoal);
      z-index: 500;
      display: flex; flex-direction: column;
      border-left: 1px solid rgba(255,69,0,0.2);
      animation: slideDrawer 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    @keyframes slideDrawer {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }
    .cart-drawer-head {
      padding: 28px 32px;
      border-bottom: 1px solid rgba(255,248,240,0.07);

    .cart-items-list {

    .cart-items-list::-webkit-scrollbar-thumb { background: var(--fire); }
    .cart-empty {

    .cart-item {

      align-items: flex-start;

    .cart-item-img {
      width: 70px; height: 70px;
      object-fit: cover; flex-shrink: 0;
      border: 1px solid rgba(255,248,240,0.08);
    }
    .cart-item-body { flex: 1; }
    .cart-item-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .cart-item-mods {
      font-size: 11px; color: var(--muted); font-weight: 300;
      margin-bottom: 8px; line-height: 1.5;
    }
    .cart-item-qty {
      display: flex; align-items: center; gap: 10px;
    }
    .qty-btn {
      width: 26px; height: 26px;
      background: var(--ash); border: none; color: var(--cream);
      font-size: 16px; cursor: none;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .qty-btn:hover { background: var(--fire); }
    .qty-num { font-weight: 700; font-size: 14px; min-width: 20px; text-align: center; }
    .cart-item-price {
      font-weight: 700; font-size: 16px;
      color: var(--gold); flex-shrink: 0;
      margin-left: auto;
    }
    .cart-item-remove {
      background: none; border: none; color: var(--smoke);
      font-size: 18px; cursor: none; transition: color 0.2s;
      padding: 0 4px;
    }
    .cart-item-remove:hover { color: #e74c3c; }

    .cart-drawer-foot {
      padding: 24px 32px;
      border-top: 1px solid rgba(255,248,240,0.07);
      flex-shrink: 0;
    }
    .cart-subtotal-row {
      display: flex; justify-content: space-between;
      margin-bottom: 8px; font-size: 14px; color: var(--muted);
    }
    .cart-total-row {
      display: flex; justify-content: space-between;
      margin-bottom: 24px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,248,240,0.07);
    }
    .cart-total-label {
      font-family: var(--font-display); font-size: 20px; letter-spacing: 2px;
    }
    .cart-total-price {
      font-family: var(--font-display); font-size: 28px;
      color: var(--gold); letter-spacing: 1px;
    }
    .checkout-btn {
      width: 100%;
      background: var(--fire); color: white; border: none;
      padding: 18px; font-family: var(--font-body);
      font-weight: 700; font-size: 14px;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: none; transition: all 0.3s;
    }
    .checkout-btn:hover { background: var(--ember); transform: translateY(-1px); box-shadow: 0 10px 30px rgba(255,69,0,0.4); }
    .cart-note {
      text-align: center; margin-top: 12px;
      font-size: 11px; color: var(--smoke);
    }

    /* ===================== LOGIN MODAL ===================== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      z-index: 600;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      animation: fadeOverlay 0.3s ease;
    }
    .auth-modal {
      background: var(--charcoal);
      width: 100%; max-width: 460px;
      border: 1px solid rgba(255,69,0,0.2);
      position: relative;
      animation: modalPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
      overflow: hidden;
    }
    @keyframes modalPop {
      from { opacity:0; transform: scale(0.88) translateY(20px); }
      to { opacity:1; transform: scale(1) translateY(0); }
    }
    .auth-modal-top {
      background: linear-gradient(135deg, var(--fire) 0%, #c0392b 100%);
      padding: 40px 40px 32px;
      position: relative;
    }
    .auth-modal-logo {
      font-family: var(--font-display);
      font-size: 36px; letter-spacing: 4px;
      color: white; margin-bottom: 8px;
    }
    .auth-modal-logo span { color: var(--gold); }
    .auth-modal-tagline {
      font-size: 13px; color: rgba(255,255,255,0.75);
      font-weight: 300;
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.15);
      border: none; color: white;
      font-size: 18px; cursor: none;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.3); }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,248,240,0.07);
    }
    .auth-tab {
      flex: 1; padding: 18px;
      background: transparent; border: none; color: var(--muted);
      font-family: var(--font-body); font-weight: 600;
      font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
      cursor: none; transition: all 0.2s;
      border-bottom: 2px solid transparent;
    }
    .auth-tab.active { color: var(--fire); border-bottom-color: var(--fire); }

    .auth-body { padding: 32px 40px 40px; }
    .auth-field { margin-bottom: 20px; }
    .auth-label {
      display: block; font-size: 11px;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); font-weight: 600;
      margin-bottom: 8px;
    }
    .auth-input {
      width: 100%; padding: 14px 18px;
      background: var(--ash);
      border: 1px solid rgba(255,248,240,0.08);
      color: var(--cream); font-family: var(--font-body);
      font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--fire); }
    .auth-input::placeholder { color: var(--smoke); }
    .auth-submit {
      width: 100%; padding: 16px;
      background: var(--fire); color: white; border: none;
      font-family: var(--font-body); font-weight: 700;
      font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
      cursor: none; transition: all 0.3s; margin-top: 8px;
    }
    .auth-submit:hover { background: var(--ember); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,69,0,0.4); }
    .auth-divider {
      text-align: center; margin: 20px 0;
      font-size: 12px; color: var(--smoke);
      position: relative;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      position: absolute; top: 50%;
      width: 40%; height: 1px;
      background: rgba(255,248,240,0.07);
    }
    .auth-divider::before { left: 0; }
    .auth-divider::after { right: 0; }
    .auth-social-btns { display: flex; gap: 12px; }
    .auth-social-btn {
      flex: 1; padding: 12px;
      background: var(--ash);
      border: 1px solid rgba(255,248,240,0.08);
      color: var(--cream); font-family: var(--font-body);
      font-size: 13px; cursor: none;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: border-color 0.2s;
    }
    .auth-social-btn:hover { border-color: rgba(255,248,240,0.25); }
    .auth-switch {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: var(--muted);
    }
    .auth-switch span {
      color: var(--fire); cursor: none; font-weight: 600;
      text-decoration: underline;
    }
    .auth-perks {
      display: flex; gap: 16px; flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .auth-perk {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
    }
    .auth-perk-icon { color: var(--gold); }

    /* ===================== CUSTOMIZER MODAL ===================== */
    .customizer-modal {
      background: var(--charcoal);
      width: 100%; max-width: 560px;
      max-height: 90vh;
      border: 1px solid rgba(255,69,0,0.2);
      position: relative;
      overflow: hidden;
      display: flex; flex-direction: column;
      animation: modalPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .cust-img {
      width: 100%; height: 200px;
      object-fit: cover; flex-shrink: 0;
    }
    .cust-head {
      padding: 24px 32px 0;
      flex-shrink: 0;
    }
    .cust-name {
      font-family: var(--font-display);
      font-size: 32px; letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .cust-base-price { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
    .cust-body { padding: 0 32px 24px; overflow-y: auto; flex: 1; }
    .cust-body::-webkit-scrollbar { width: 3px; }
    .cust-body::-webkit-scrollbar-thumb { background: var(--fire); }
    .cust-section { margin-bottom: 28px; }
    .cust-section-title {
      font-family: var(--font-display);
      font-size: 16px; letter-spacing: 2px;
      color: var(--cream); margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,248,240,0.07);
      display: flex; align-items: center; gap: 10px;
    }
    .cust-section-note {
      font-size: 10px; font-family: var(--font-body);
      color: var(--muted); letter-spacing: 1px; font-weight: 400;
      text-transform: uppercase;
    }
    .cust-options { display: flex; flex-wrap: wrap; gap: 8px; }
    .cust-option {
      padding: 8px 18px;
      border: 1px solid rgba(255,248,240,0.12);
      color: var(--muted); font-size: 13px;
      cursor: none; transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
      background: transparent;
      font-family: var(--font-body);
    }
    .cust-option.selected {
      border-color: var(--fire);
      color: var(--cream);
      background: rgba(255,69,0,0.12);
    }
    .cust-option.removed {
      border-color: #e74c3c;
      color: #e74c3c;
      background: rgba(231,76,60,0.08);
      text-decoration: line-through;
    }
    .cust-option-price {
      font-size: 11px; color: var(--fire);
      font-weight: 600;
    }
    .cust-option.selected .cust-option-price { color: var(--gold); }
    .cust-foot {
      padding: 20px 32px;
      border-top: 1px solid rgba(255,248,240,0.07);
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
      background: var(--charcoal);
    }
    .cust-total { }
    .cust-total-label {
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 2px;
    }
    .cust-total-price {
      font-family: var(--font-display); font-size: 28px;
      color: var(--gold); letter-spacing: 1px;
    }
    .cust-add-btn {
      background: var(--fire); color: white; border: none;
      padding: 16px 32px; font-family: var(--font-body);
      font-weight: 700; font-size: 13px; letter-spacing: 2px;
      text-transform: uppercase; cursor: none; transition: all 0.3s;
    }
    .cust-add-btn:hover { background: var(--ember); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,69,0,0.4); }

    /* ===================== BLOG SECTION ===================== */
    .blog-section { background: var(--dark); }
    .blog-grid {
      display: grid;
      grid-template-columns: 1.6fr 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 24px;
      margin-top: 60px;
    }
    .blog-card {
      background: var(--charcoal);
      overflow: hidden; cursor: none;
      transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.4s;
      display: flex; flex-direction: column;
    }
    .blog-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }
    .blog-card.featured { grid-row: span 2; }
    .blog-img-wrap { position: relative; overflow: hidden; }
    .blog-card.featured .blog-img-wrap { height: 340px; }
    .blog-card:not(.featured) .blog-img-wrap { height: 180px; }
    .blog-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
    .blog-card:hover .blog-img { transform: scale(1.06); }
    .blog-cat-tag {
      position: absolute; top: 16px; left: 16px;
      background: var(--fire); color: white;
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 4px 12px;
    }
    .blog-body { padding: 24px; flex: 1; display: flex; flex-direction: column; }
    .blog-meta {
      font-size: 11px; color: var(--smoke);
      letter-spacing: 1px; margin-bottom: 10px;
    }
    .blog-title {
      font-family: var(--font-display);
      letter-spacing: 1px; line-height: 1.1;
      margin-bottom: 10px;
    }
    .blog-card.featured .blog-title { font-size: 28px; }
    .blog-card:not(.featured) .blog-title { font-size: 20px; }
    .blog-excerpt {
      font-size: 13px; color: var(--muted);
      line-height: 1.7; font-weight: 300;
      flex: 1;
    }
    .blog-card:not(.featured) .blog-excerpt { display: none; }
    .blog-read-more {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--fire); font-size: 12px;
      font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; text-decoration: none;
      margin-top: 16px; cursor: none;
      transition: gap 0.2s;
    }
    .blog-read-more:hover { gap: 14px; }

    /* ======================================================
       FULL RESPONSIVE SYSTEM — Mobile · Tablet · Desktop
    ====================================================== */

    /* ── MOBILE HAMBURGER MENU STATE ── */
    .mobile-menu-open { overflow: hidden; }
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: none;
      padding: 4px;
      z-index: 201;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 2px;
      background: var(--cream);
      transition: all 0.3s;
    }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    .mobile-nav-drawer {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--dark);
      z-index: 200;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 80px 32px 40px;
      animation: slideDrawer 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .mobile-nav-link {
      font-family: var(--font-display);
      font-size: 40px;
      letter-spacing: 4px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      text-align: center;
      display: block;
      padding: 8px 0;
      width: 100%;
      border-bottom: 1px solid rgba(255,248,240,0.05);
    }
    .mobile-nav-link:hover, .mobile-nav-link:active { color: var(--fire); }
    .mobile-nav-actions {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      width: 100%;
    }
    .mobile-nav-actions button { flex: 1; }

    /* ── TABLET: 601px – 1024px ── */
    @media (max-width: 1024px) {
      nav { padding: 20px 32px; }
      nav.scrolled { padding: 14px 32px; }
      .nav-links { gap: 24px; }
      .nav-links a { font-size: 11px; }
      .section { padding: 80px 32px; }
      .hero-left { padding: 140px 32px 80px; }
      .hero-title { font-size: clamp(60px, 7vw, 100px); }
      .menu-grid { grid-template-columns: repeat(2, 1fr); }
      .categories-grid { grid-template-columns: repeat(3, 1fr); }
      .deals-grid { grid-template-columns: repeat(2, 1fr); }
      .eid-deals-grid { grid-template-columns: repeat(2, 1fr); }
      .blog-grid { grid-template-columns: 1fr 1fr; }
      .blog-card.featured { grid-column: span 2; }
      .footer-grid { grid-template-columns: 1fr 1fr; gap: 40px; }
      .feature-strip { grid-template-columns: repeat(2, 1fr); }
      .feature-item:nth-child(2) { border-right: none; }
      .feature-item:nth-child(3) { border-top: 1px solid rgba(255,248,240,0.06); }
      .feature-item:nth-child(4) { border-top: 1px solid rgba(255,248,240,0.06); border-right: none; }
      .specials-grid { grid-template-columns: 1fr; }
      .special-card:first-child { grid-row: auto; height: 400px; }
      .testimonials-grid { grid-template-columns: 1fr 1fr; }
      .testimonials-grid .testimonial-card:last-child { grid-column: span 2; }
      .cta-section { padding: 100px 32px; }
      footer { padding: 60px 32px 32px; }
      .eid-hero-banner { padding: 40px 32px; gap: 24px; }
      .eid-pill-num { font-size: 60px; }
    }

    /* ── MOBILE: ≤ 600px ── */
    @media (max-width: 600px) {
      /* cursor off on touch */
      body { cursor: auto; }
      .cursor, .cursor-follower { display: none; }

      /* NAV — hamburger */
      nav { padding: 16px 20px; }
      nav.scrolled { padding: 12px 20px; }
      .nav-links { display: none; }
      .nav-desktop-actions { display: none; }
      .hamburger { display: flex; }

      /* HERO — single column */
      .hero { grid-template-columns: 1fr; min-height: 100svh; }
      .hero-right { display: none; }
      .hero-left {
        padding: 100px 20px 60px;
        background: linear-gradient(to bottom, rgba(10,8,5,0.3) 0%, var(--dark) 100%),
                    url('https://images.unsplash.com/photo-1550547660-d9450f859349?w=800&q=70') center/cover no-repeat;
      }
      .hero-title { font-size: clamp(52px, 14vw, 80px); }
      .hero-title-sub { font-size: 18px; }
      .hero-desc { font-size: 14px; margin-bottom: 36px; }
      .hero-actions { flex-direction: column; gap: 12px; }
      .hero-actions .btn-primary,
      .hero-actions .btn-ghost { width: 100%; text-align: center; padding: 16px 24px; }
      .hero-stats { gap: 24px; margin-top: 48px; padding-top: 28px; }
      .stat-num { font-size: 32px; }
      .hero-badge { margin-bottom: 28px; }

      /* MARQUEE */
      .marquee-inner span { font-size: 14px; margin: 0 20px; }

      /* SECTIONS */
      .section { padding: 60px 20px; }
      .section-title { font-size: clamp(36px, 10vw, 56px); }

      /* CATEGORIES */
      .categories-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .cat-name { font-size: 16px; }

      /* FEATURES */
      .feature-strip { grid-template-columns: 1fr 1fr; }
      .feature-item { padding: 32px 20px; border-right: none; }
      .feature-item:nth-child(odd) { border-right: 1px solid rgba(255,248,240,0.06); }
      .feature-item:nth-child(3),
      .feature-item:nth-child(4) { border-top: 1px solid rgba(255,248,240,0.06); }
      .feature-icon { font-size: 28px; margin-bottom: 12px; }
      .feature-title { font-size: 16px; }
      .feature-desc { font-size: 12px; }

      /* MENU */
      .menu-header { flex-direction: column; align-items: flex-start; gap: 20px; margin-bottom: 32px; }
      .menu-filters { flex-wrap: wrap; gap: 6px; }
      .filter-btn { padding: 8px 14px; font-size: 10px; letter-spacing: 1px; }
      .menu-grid { grid-template-columns: 1fr; gap: 16px; }
      .menu-add-btn { opacity: 1; transform: translateY(0); }
      .menu-name { font-size: 22px; }
      .menu-info { padding: 16px; }

      /* DEALS */
      .deals-timer-bar { padding: 12px 20px; flex-direction: column; gap: 10px; }
      .deals-timer-label { font-size: 10px; text-align: center; }
      .timer-num { font-size: 20px; }
      .deals-grid { grid-template-columns: 1fr; gap: 16px; }
      .deal-card { }
      .deal-body { padding: 16px; }
      .deal-name { font-size: 22px; }
      .deals-banner { grid-template-columns: 1fr; padding: 28px 20px; text-align: center; gap: 24px; }
      .banner-divider { display: none; }
      .banner-title { font-size: 28px; }
      .banner-code { font-size: 28px; letter-spacing: 4px; padding: 12px 20px; }

      /* EID */
      .eid-hero-banner { grid-template-columns: 1fr; padding: 32px 20px; gap: 24px; text-align: center; }
      .eid-banner-title { font-size: clamp(32px, 9vw, 52px); }
      .eid-banner-sub { font-size: 13px; }
      .eid-discount-pill { padding: 20px 28px; display: inline-block; }
      .eid-pill-num { font-size: 64px; }
      .eid-deals-grid { grid-template-columns: 1fr; gap: 16px; }
      .eid-card-body { padding: 16px; }
      .eid-card-name { font-size: 22px; }
      .eid-ends-strip { flex-direction: column; padding: 20px; text-align: center; gap: 8px; }

      /* SPECIALS */
      .specials-grid { grid-template-columns: 1fr; gap: 12px; }
      .special-card { height: 260px; }
      .special-card:first-child { height: 260px; grid-row: auto; }
      .special-name { font-size: 26px; }
      .special-overlay { padding: 20px; }

      /* BLOG */
      .blog-grid { grid-template-columns: 1fr; gap: 16px; }
      .blog-card.featured { grid-row: auto; grid-column: auto; }
      .blog-card.featured .blog-img-wrap { height: 220px; }
      .blog-card:not(.featured) .blog-img-wrap { height: 160px; }
      .blog-title { font-size: 18px !important; }

      /* TESTIMONIALS */
      .testimonials-grid { grid-template-columns: 1fr; gap: 16px; }
      .testimonials-grid .testimonial-card:last-child { grid-column: auto; }
      .testimonial-card { padding: 28px 20px; }

      /* CTA */
      .cta-section { padding: 80px 20px; }
      .cta-subtitle { font-size: 15px; }
      .cta-actions { flex-direction: column; align-items: stretch; gap: 12px; }
      .cta-actions .btn-primary,
      .cta-actions .btn-ghost { font-size: 14px; padding: 16px 24px; }

      /* FOOTER */
      footer { padding: 48px 20px 28px; }
      .footer-grid { grid-template-columns: 1fr; gap: 32px; }
      .footer-brand-name { font-size: 32px; }
      .footer-bottom { flex-direction: column; gap: 8px; text-align: center; }

      /* CART DRAWER */
      .cart-drawer { width: 100%; border-left: none; border-top: 1px solid rgba(255,69,0,0.2); }
      .cart-drawer-head { padding: 20px; }
      .cart-items-list { padding: 16px 20px; }
      .cart-drawer-foot { padding: 16px 20px; }
      .cart-bubble { bottom: 20px; right: 20px; width: 52px; height: 52px; font-size: 20px; }

      /* AUTH MODAL */
      .modal-overlay { padding: 0; align-items: flex-end; }
      .auth-modal { max-width: 100%; border-radius: 0; border-bottom: none;
        border-left: none; border-right: none;
        animation: slideUp 0.35s cubic-bezier(0.25,0.46,0.45,0.94); }
      @keyframes slideUp {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .auth-modal-top { padding: 24px 20px 20px; }
      .auth-body { padding: 20px; max-height: 70svh; overflow-y: auto; }
      .auth-modal-logo { font-size: 28px; }
      .auth-social-btns { flex-direction: column; }

      /* CUSTOMIZER */
      .modal-overlay.cust-overlay { align-items: flex-end; padding: 0; }
      .customizer-modal {
        max-width: 100%; max-height: 92svh;
        animation: slideUp 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
      }
      .cust-img { height: 160px; }
      .cust-head { padding: 16px 20px 0; }
      .cust-body { padding: 0 20px 16px; }
      .cust-foot { padding: 14px 20px; }
      .cust-name { font-size: 24px; }
      .cust-option { padding: 6px 12px; font-size: 12px; }

      /* TOAST */
      .toast { right: 12px; bottom: 88px; left: 12px; }
    }

    /* ── VERY SMALL: ≤ 380px (Samsung Galaxy S, iPhone SE) ── */
    @media (max-width: 380px) {
      .hero-title { font-size: 48px; }
      .section-title { font-size: 34px; }
      .categories-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .cat-name { font-size: 14px; }
      .filter-btn { padding: 6px 10px; font-size: 9px; }
      .menu-name { font-size: 20px; }
      .deal-name, .eid-card-name { font-size: 20px; }
      .nav-logo { font-size: 26px; }
    }

    /* ======================================================
       FLASH SALE POPUP
    ====================================================== */
    .flash-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: fadeOverlay 0.4s ease;
    }
    .flash-popup {
      width: 100%; max-width: 520px;
      background: var(--charcoal);
      border: 1px solid rgba(255,69,0,0.3);
      position: relative;
      overflow: hidden;
      animation: modalPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .flash-popup::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,69,0,0.18) 0%, transparent 65%);
      pointer-events: none;
    }
    .flash-header {
      background: linear-gradient(135deg, var(--fire) 0%, #c0392b 100%);
      padding: 28px 32px 22px;
      text-align: center;
      position: relative;
    }
    .flash-close {
      position: absolute; top: 12px; right: 14px;
      background: rgba(255,255,255,0.15); border: none;
      color: white; width: 30px; height: 30px;
      font-size: 16px; cursor: none;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .flash-close:hover { background: rgba(255,255,255,0.3); }
    .flash-emoji { font-size: 44px; display: block; margin-bottom: 8px; animation: wiggle 0.6s ease infinite alternate; }
    @keyframes wiggle { from { transform: rotate(-8deg) scale(1); } to { transform: rotate(8deg) scale(1.1); } }
    .flash-title {
      font-family: var(--font-display);
      font-size: 38px; letter-spacing: 4px; color: white; line-height: 1;
    }
    .flash-subtitle { font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 6px; font-weight: 300; letter-spacing: 1px; }
    .flash-body { padding: 28px 32px; }
    .flash-deal-row {
      display: flex; align-items: center; gap: 16px;
      background: var(--ash); padding: 14px 16px; margin-bottom: 10px;
      border: 1px solid rgba(255,248,240,0.05);
      transition: border-color 0.2s;
    }
    .flash-deal-row:hover { border-color: rgba(255,69,0,0.3); }
    .flash-deal-img { width: 56px; height: 56px; object-fit: cover; flex-shrink: 0; }
    .flash-deal-info { flex: 1; }
    .flash-deal-name { font-family: var(--font-display); font-size: 18px; letter-spacing: 1px; margin-bottom: 2px; }
    .flash-deal-desc { font-size: 11px; color: var(--muted); font-weight: 300; }
    .flash-deal-prices { text-align: right; flex-shrink: 0; }
    .flash-old-price { font-size: 12px; color: var(--smoke); text-decoration: line-through; display: block; }
    .flash-new-price { font-family: var(--font-display); font-size: 22px; color: var(--gold); letter-spacing: 1px; }
    .flash-add-btn {
      background: transparent; border: 1px solid rgba(255,69,0,0.4);
      color: var(--fire); width: 34px; height: 34px;
      font-size: 20px; cursor: none; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .flash-add-btn:hover { background: var(--fire); color: white; border-color: var(--fire); }
    .flash-timer-row {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin: 18px 0 20px;
      padding: 14px; background: rgba(255,69,0,0.07);
      border: 1px solid rgba(255,69,0,0.15);
    }
    .flash-timer-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 600; }
    .flash-timer-boxes { display: flex; gap: 6px; align-items: center; }
    .flash-tbox { background: var(--dark); padding: 5px 10px; text-align: center; min-width: 44px; }
    .flash-tnum { font-family: var(--font-display); font-size: 22px; color: var(--fire); display: block; line-height: 1; }
    .flash-tunit { font-size: 8px; letter-spacing: 2px; color: var(--smoke); text-transform: uppercase; }
    .flash-tcolon { font-family: var(--font-display); font-size: 18px; color: var(--smoke); margin-bottom: 2px; }
    .flash-cta {
      width: 100%; background: var(--fire); color: white; border: none;
      padding: 16px; font-family: var(--font-body); font-weight: 800;
      font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
      cursor: none; transition: all 0.3s;
    }
    .flash-cta:hover { background: var(--ember); transform: translateY(-1px); box-shadow: 0 8px 28px rgba(255,69,0,0.45); }
    .flash-skip { text-align: center; margin-top: 12px; font-size: 12px; color: var(--smoke); cursor: none; }
    .flash-skip span { color: var(--muted); text-decoration: underline; cursor: none; }
    .flash-skip span:hover { color: var(--cream); }

    /* ======================================================
       LIVE ORDER TRACKER MODAL
    ====================================================== */
    .tracker-modal {
      background: var(--charcoal);
      width: 100%; max-width: 560px;
      max-height: 90vh;
      border: 1px solid rgba(255,69,0,0.2);
      overflow: hidden; display: flex; flex-direction: column;
      animation: modalPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .tracker-head {
      padding: 28px 32px 20px;
      border-bottom: 1px solid rgba(255,248,240,0.07);
      display: flex; justify-content: space-between; align-items: flex-start;
      flex-shrink: 0;
    }
    .tracker-head-left {}
    .tracker-title { font-family: var(--font-display); font-size: 28px; letter-spacing: 3px; }
    .tracker-title span { color: var(--fire); }
    .tracker-order-id { font-size: 11px; color: var(--smoke); letter-spacing: 2px; margin-top: 4px; }
    .tracker-body { padding: 24px 32px; overflow-y: auto; flex: 1; }
    .tracker-body::-webkit-scrollbar { width: 3px; }
    .tracker-body::-webkit-scrollbar-thumb { background: var(--fire); }

    /* animated map strip */
    .tracker-map {
      height: 140px; background: var(--ash);
      border: 1px solid rgba(255,248,240,0.07);
      margin-bottom: 28px; position: relative; overflow: hidden;
    }
    .tracker-map-bg {
      position: absolute; inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(255,248,240,0.03) 28px, rgba(255,248,240,0.03) 29px),
        repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(255,248,240,0.03) 28px, rgba(255,248,240,0.03) 29px);
    }
    .tracker-rider {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      font-size: 28px;
      animation: rideAcross 4s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 8px rgba(255,69,0,0.6));
    }
    @keyframes rideAcross {
      from { left: 10%; }
      to   { left: 75%; }
    }
    .tracker-dest {
      position: absolute; right: 12%; top: 50%; transform: translateY(-50%);
      font-size: 28px;
    }
    .tracker-road {
      position: absolute; bottom: 36%; left: 0; right: 0;
      height: 2px; background: rgba(255,69,0,0.3);
    }
    .tracker-road-dot {
      position: absolute; top: -4px;
      width: 10px; height: 10px;
      background: var(--fire); border-radius: 50%;
      animation: dotPulse 1.5s ease-in-out infinite;
    }
    @keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.6)} }
    .tracker-eta {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      background: var(--dark); border: 1px solid rgba(255,69,0,0.3);
      padding: 6px 16px; white-space: nowrap;
    }
    .tracker-eta-label { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
    .tracker-eta-time { font-family: var(--font-display); font-size: 18px; color: var(--fire); letter-spacing: 2px; }

    /* steps */
    .tracker-steps { display: flex; flex-direction: column; gap: 0; }
    .tracker-step {
      display: flex; gap: 20px; position: relative; padding-bottom: 28px;
    }
    .tracker-step:last-child { padding-bottom: 0; }
    .tracker-step-left { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
    .tracker-step-icon {
      width: 44px; height: 44px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      border: 2px solid rgba(255,248,240,0.1);
      background: var(--ash); transition: all 0.5s;
      position: relative; z-index: 1;
    }
    .tracker-step.done .tracker-step-icon {
      background: var(--fire); border-color: var(--fire);
      box-shadow: 0 0 20px rgba(255,69,0,0.5);
    }
    .tracker-step.active .tracker-step-icon {
      background: rgba(255,69,0,0.15); border-color: var(--fire);
      animation: stepPulse 1.5s ease-in-out infinite;
    }
    @keyframes stepPulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,69,0,0.4)} 50%{box-shadow:0 0 0 10px rgba(255,69,0,0)} }
    .tracker-step-line {
      width: 2px; flex: 1; margin: 4px 0;
      background: rgba(255,248,240,0.07); min-height: 20px;
    }
    .tracker-step.done .tracker-step-line { background: var(--fire); }
    .tracker-step-right { padding-top: 8px; }
    .tracker-step-name { font-family: var(--font-display); font-size: 18px; letter-spacing: 1px; margin-bottom: 4px; }
    .tracker-step.done .tracker-step-name { color: var(--cream); }
    .tracker-step.pending .tracker-step-name { color: var(--smoke); }
    .tracker-step.active .tracker-step-name { color: var(--fire); }
    .tracker-step-desc { font-size: 12px; color: var(--muted); font-weight: 300; line-height: 1.5; }
    .tracker-step-time { font-size: 11px; color: var(--fire); font-weight: 600; margin-top: 4px; }
    .tracker-step.pending .tracker-step-time { color: var(--smoke); }

    .tracker-items-preview {
      margin-top: 24px; padding: 16px;
      background: var(--ash); border: 1px solid rgba(255,248,240,0.06);
    }
    .tracker-items-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 12px; }
    .tracker-item-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .tracker-item-row:last-child { margin-bottom: 0; }
    .tracker-item-img { width: 40px; height: 40px; object-fit: cover; border: 1px solid rgba(255,248,240,0.07); flex-shrink: 0; }
    .tracker-item-name { font-size: 13px; font-weight: 500; }
    .tracker-item-qty { font-size: 11px; color: var(--muted); }
    .tracker-foot {
      padding: 0;
      border-top: 1px solid rgba(255,248,240,0.07);
      flex-shrink: 0;
      overflow: hidden;
    }
    .tracker-support-panel {
      padding: 20px 28px 22px;
    }
    .tracker-support-label {
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--smoke); font-weight: 700; margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .tracker-support-label::before, .tracker-support-label::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,248,240,0.06);
    }

    /* Pro call card */
    .tracker-call-card {
      background: linear-gradient(135deg, #1a0e08 0%, var(--ash) 100%);
      border: 1px solid rgba(255,69,0,0.25);
      padding: 18px 20px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 16px;
    }
    .tracker-call-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--fire);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0; position: relative;
      box-shadow: 0 0 0 0 rgba(255,69,0,0.4);
      animation: callRing 2.5s ease-out infinite;
    }
    @keyframes callRing {
      0%   { box-shadow: 0 0 0 0 rgba(255,69,0,0.5); }
      70%  { box-shadow: 0 0 0 14px rgba(255,69,0,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,69,0,0); }
    }
    .tracker-call-info { flex: 1; min-width: 0; }
    .tracker-call-name {
      font-family: var(--font-display); font-size: 18px;
      letter-spacing: 2px; line-height: 1; margin-bottom: 3px;
    }
    .tracker-call-number {
      font-size: 13px; color: var(--muted); letter-spacing: 1px;
    }
    .tracker-call-status {
      display: flex; align-items: center; gap: 6px;
      margin-top: 5px;
    }
    .tracker-call-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #27ae60;
      animation: pulse 1.5s infinite;
    }
    .tracker-call-status-text {
      font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; color: #27ae60; font-weight: 700;
    }

    /* Action buttons row */
    .tracker-support-btns { display: flex; gap: 8px; }
    .tracker-call-btn {
      flex: 1.5; background: var(--fire); color: white; border: none;
      padding: 14px 12px; font-family: var(--font-body); font-weight: 800;
      font-size: 13px; cursor: none; transition: all 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      text-decoration: none; letter-spacing: 1px;
      box-shadow: 0 4px 20px rgba(255,69,0,0.4);
      position: relative; overflow: hidden;
    }
    .tracker-call-btn::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(255,255,255,0.12);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }
    .tracker-call-btn:hover::before { transform: translateX(100%); }
    .tracker-call-btn:hover { background: var(--ember); transform: translateY(-2px); box-shadow: 0 10px 32px rgba(255,69,0,0.55); }

    .tracker-whatsapp-btn {
      flex: 1; background: #128C7E; color: white; border: none;
      padding: 14px 12px; font-family: var(--font-body); font-weight: 700;
      font-size: 13px; cursor: none; transition: all 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      text-decoration: none; letter-spacing: 1px;
      box-shadow: 0 4px 16px rgba(18,140,126,0.3);
    }
    .tracker-whatsapp-btn:hover { background: #075E54; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(18,140,126,0.5); }

    .tracker-receipt-btn {
      flex: 0.8; background: transparent;
      border: 1px solid rgba(255,215,0,0.2);
      color: var(--muted); padding: 14px 10px; font-family: var(--font-body);
      font-weight: 600; font-size: 12px; cursor: none; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      letter-spacing: 1px;
    }
    .tracker-receipt-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.05); }

    @media (max-width: 600px) {
      .tracker-support-panel { padding: 16px 18px 18px; }
      .tracker-support-btns { flex-wrap: wrap; }
      .tracker-call-btn { flex: 1; }
      .tracker-whatsapp-btn { flex: 1; }
      .tracker-receipt-btn { flex: 100%; }
    }

    /* Track Order FAB — floating button next to cart */
    .track-fab {
      position: fixed; bottom: 40px; right: 110px;
      background: var(--charcoal);
      border: 1px solid rgba(255,69,0,0.3);
      color: var(--cream); padding: 0 18px;
      height: 52px; display: flex; align-items: center; gap: 8px;
      cursor: none; z-index: 200;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: all 0.3s; font-size: 13px; font-weight: 600;
    }
    .track-fab:hover { border-color: var(--fire); background: rgba(255,69,0,0.1); }
    .track-fab-dot { width: 8px; height: 8px; background: #27ae60; border-radius: 50%; animation: pulse 1.5s infinite; flex-shrink: 0; }

    @media (max-width: 600px) {
      .track-fab { right: 84px; bottom: 20px; padding: 0 12px; height: 44px; font-size: 11px; }
      .tracker-head { padding: 20px; }
      .tracker-body { padding: 16px 20px; }
      .tracker-foot { padding: 14px 20px; flex-direction: column; }
      .flash-body { padding: 20px; }
      .flash-header { padding: 22px 20px 18px; }
      .flash-title { font-size: 30px; }
    }

    /* ======================================================
       FULL CHECKOUT SYSTEM
    ====================================================== */
    .checkout-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: fadeOverlay 0.3s ease;
    }
    .checkout-modal {
      background: var(--charcoal);
      width: 100%; max-width: 860px;
      max-height: 92vh;
      border: 1px solid rgba(255,69,0,0.2);
      display: flex; flex-direction: column;
      overflow: hidden;
      animation: modalPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    /* Progress bar */
    .co-progress {
      display: flex; align-items: center;
      padding: 20px 32px;
      background: var(--ash);
      border-bottom: 1px solid rgba(255,248,240,0.06);
      flex-shrink: 0; gap: 0;
    }
    .co-step-pill {
      display: flex; align-items: center; gap: 10px;
      flex: 1; position: relative;
    }
    .co-step-pill:not(:last-child)::after {
      content: '';
      position: absolute; left: calc(100% - 20px); top: 50%;
      transform: translateY(-50%);
      width: 40px; height: 2px;
      background: rgba(255,248,240,0.08);
      z-index: 0;
    }
    .co-step-pill.done:not(:last-child)::after { background: var(--fire); }
    .co-step-num {
      width: 32px; height: 32px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
      background: var(--smoke); color: var(--muted);
      border: 2px solid transparent; transition: all 0.3s; position: relative; z-index: 1;
    }
    .co-step-pill.active .co-step-num { background: var(--fire); color: white; border-color: var(--fire); box-shadow: 0 0 16px rgba(255,69,0,0.5); }
    .co-step-pill.done .co-step-num { background: var(--fire); color: white; border-color: var(--fire); }
    .co-step-label { font-size: 11px; letter-spacing: 1px; font-weight: 600; color: var(--smoke); text-transform: uppercase; }
    .co-step-pill.active .co-step-label { color: var(--cream); }
    .co-step-pill.done .co-step-label { color: var(--muted); }

    /* Shared layout */
    .co-body {
      display: grid; grid-template-columns: 1fr 360px;
      flex: 1; overflow: hidden;
    }
    .co-left { padding: 32px; overflow-y: auto; border-right: 1px solid rgba(255,248,240,0.06); }
    .co-left::-webkit-scrollbar { width: 3px; }
    .co-left::-webkit-scrollbar-thumb { background: var(--fire); }
    .co-right { padding: 24px; overflow-y: auto; background: var(--ash); }
    .co-right::-webkit-scrollbar { width: 3px; }
    .co-right::-webkit-scrollbar-thumb { background: var(--fire); }

    .co-section-title {
      font-family: var(--font-display); font-size: 22px;
      letter-spacing: 2px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
    }
    .co-section-title span { color: var(--fire); }

    /* Fields */
    .co-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .co-row.full { grid-template-columns: 1fr; }
    .co-field { display: flex; flex-direction: column; gap: 6px; }
    .co-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 600; }
    .co-input {
      background: var(--ash); border: 1px solid rgba(255,248,240,0.1);
      color: var(--cream); font-family: var(--font-body); font-size: 14px;
      padding: 13px 16px; outline: none; transition: border-color 0.2s; width: 100%;
    }
    .co-input:focus { border-color: var(--fire); }
    .co-input::placeholder { color: var(--smoke); }
    .co-input.error { border-color: #e74c3c; }
    .co-select {
      background: var(--ash); border: 1px solid rgba(255,248,240,0.1);
      color: var(--cream); font-family: var(--font-body); font-size: 14px;
      padding: 13px 16px; outline: none; width: 100%; cursor: none;
      transition: border-color 0.2s; appearance: none;
    }
    .co-select:focus { border-color: var(--fire); }

    /* Delivery type toggle */
    .co-delivery-toggle { display: flex; gap: 12px; margin-bottom: 24px; }

      const getReferralCode = () => {

        const num  = loggedInUser.email.charCodeAt(0) * 7 % 900 + 100;
        return `${base}${num}`;

      const wheelSegments = [
        { label: '5% OFF',      color: '#FF4500', prize: { type:'discount', value:5,  code:'SPIN5',   desc:'5% off your next order' } },
        { label: 'FREE FRIES',  color: '#FFD700', prize: { type:'free',     value:449, code:'FRIES0',  desc:'Free Truffle Fries on your order' } },

      ];

      // Draw wheel on canvas
      useEffect(() => {
        if (!spinOpen || !spinCanvasRef.current) return;
        const canvas = spinCanvasRef.current;
        const ctx = canvas.getContext('2d');
        const size = canvas.width;
        const cx = size / 2, cy = size / 2, r = size / 2 - 4;
        const segAngle = (2 * Math.PI) / wheelSegments.length;
        ctx.clearRect(0, 0, size, size);
        wheelSegments.forEach((seg, i) => {
          const start = i * segAngle - Math.PI / 2;
          const end   = start + segAngle;
          // Slice
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, r, start, end);
          ctx.closePath();
          ctx.fillStyle = seg.color;
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,248,240,0.15)';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          // Text
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(start + segAngle / 2);
          ctx.textAlign = 'right';
          ctx.fillStyle = '#fff';
          ctx.font = `bold ${size < 280 ? 10 : 12}px DM Sans, sans-serif`;
          ctx.fillText(seg.label, r - 14, 4);
          ctx.restore();
        });
        // Center circle
        ctx.beginPath();
        ctx.arc(cx, cy, 24, 0, 2 * Math.PI);
        ctx.fillStyle = '#0A0805';
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,215,0,0.5)';
        ctx.lineWidth = 2;
        ctx.stroke();
      }, [spinOpen, spinDeg]);

      const doSpin = () => {
        if (spinning || spinUsed) return;
        setSpinning(true);

        // Pick random segment
        const segIdx  = Math.floor(Math.random() * wheelSegments.length);
        const segAngle = 360 / wheelSegments.length;
        // Extra rotations + land on segment
        const extraSpins = (5 + Math.floor(Math.random() * 5)) * 360;
        const targetDeg  = extraSpins + (360 - segIdx * segAngle - segAngle / 2);
        const newDeg     = spinCurrentDeg.current + targetDeg;
        spinCurrentDeg.current = newDeg % 360;
        setSpinDeg(newDeg);
        setTimeout(() => {
          setSpinResult(wheelSegments[segIdx].prize);
          setSpinning(false);
          setSpinUsed(true);
          localStorage.setItem('flare_spin_used', '1');
          // Auto-apply discount codes
          if (wheelSegments[segIdx].prize.code) {
            setPromoCode(wheelSegments[segIdx].prize.code);

      // Auth helpers
      const getAccounts = () => { try { return JSON.parse(localStorage.getItem('flare_accounts')) || []; } catch { return []; } };
      const saveAccounts = (accounts) => localStorage.setItem('flare_accounts', JSON.stringify(accounts));

      const handleSignup = () => {
        setAuthError(''); setAuthSuccess('');
        const { name, email, phone, password } = signupForm;
        if (!name.trim()) return setAuthError('Please enter your full name.');
        if (!email.trim() || !email.includes('@')) return setAuthError('Please enter a valid email address.');
        if (!phone.trim()) return setAuthError('Please enter your phone number.');
        if (password.length < 6) return setAuthError('Password must be at least 6 characters.');
        const accounts = getAccounts();
        if (accounts.find(a => a.email.toLowerCase() === email.toLowerCase())) {
          return setAuthError('An account with this email already exists. Please sign in.');
        }
        const newUser = { name, email: email.toLowerCase(), phone, password, joinedAt: new Date().toLocaleDateString() };
        saveAccounts([...accounts, newUser]);
        setLoggedInUser(newUser);
        localStorage.setItem('flare_user', JSON.stringify(newUser));
        setAuthSuccess(`Welcome to FLARE, ${name.split(' ')[0]}! 🔥`);
        setTimeout(() => { setAuthOpen(false); setAuthSuccess(''); setSignupForm({ name:'', email:'', phone:'', password:'' }); }, 1500);

        const accounts = getAccounts();
        const found = accounts.find(a => a.email.toLowerCase() === email.toLowerCase());
        if (!found) return setAuthError('No account found with this email. Please sign up first.');
        if (found.password !== password) return setAuthError('Incorrect password. Please try again.');
        setLoggedInUser(found);
        localStorage.setItem('flare_user', JSON.stringify(found));
        setAuthSuccess(`Welcome back, ${found.name.split(' ')[0]}! 🔥`);
        setTimeout(() => { setAuthOpen(false); setAuthSuccess(''); setLoginForm({ email:'', password:'' }); }, 1500);

            ...p,
            name: loggedInUser.name || '',
            phone: loggedInUser.phone || '',
            email: loggedInUser.email || '',
          }));
        }
        setCartOpen(false);
        setCheckoutOpen(true);
      };

      const validateDelivery = () => {
        const errs = {};
        if (!deliveryForm.name.trim()) errs.name = 'Required';
        if (!deliveryForm.phone.trim()) errs.phone = 'Required';
        if (!deliveryForm.email.trim() || !deliveryForm.email.includes('@')) errs.email = 'Valid email required';
        if (deliveryType === 'delivery') {
          if (!deliveryForm.city.trim()) errs.city = 'Required';
          if (deliveryForm.city && deliveryZones[deliveryForm.city] && !deliveryForm.area.trim()) errs.area = 'Please select your area';
          if (!deliveryForm.address.trim()) errs.address = 'Required';
          if (belowMin) errs.address = `Minimum order is PKR ${minOrder}`;
        }
        setCoErrors(errs);
        return Object.keys(errs).length === 0;
      };

      const validatePayment = () => {
        if (paymentMethod !== 'card') return true;
        const errs = {};
        if (cardForm.number.replace(/\s/g,'').length < 16) errs.cardNumber = 'Enter valid 16-digit card number';
        if (!cardForm.name.trim()) errs.cardName = 'Required';
        if (!cardForm.expiry.trim()) errs.expiry = 'Required';
        if (cardForm.cvv.length < 3) errs.cvv = 'Required';
        setCoErrors(errs);
        return Object.keys(errs).length === 0;
      };

      const applyPromo = () => {
        setPromoError('');
        const code = promoCode.trim().toUpperCase();
        const spinCodes = { 'SPIN5':5, 'SPIN10':10, 'SPIN15':15, 'SPIN20':20, 'FRIES0':5, 'DRINK0':5, 'OFF100':8 };
        const refCode = loggedInUser ? getReferralCode() : null;
        if (code === 'FLARE15' || code === refCode) {
          setPromoApplied(true);
        } else if (spinCodes[code] !== undefined) {
          setPromoApplied(true);
        } else {
          setPromoError('Invalid promo code.');
        }
      };

      const formatCard = (val) => val.replace(/\D/g,'').slice(0,16).replace(/(.{4})/g,'$1 ').trim();
      const formatExpiry = (val) => { const v = val.replace(/\D/g,'').slice(0,4); return v.length > 2 ? v.slice(0,2)+'/'+v.slice(2) : v; };

      const placeOrder = () => {
        const orderId = 'FLR-' + Math.floor(100000 + Math.random() * 900000);
        setPlacedOrderId(orderId);
        const freshTotal = cart.reduce((s,i) => s + (Number(i.finalPrice)||0) * (Number(i.qty)||1), 0);
        const freshFee   = deliveryType === 'pickup' ? 0 : (selectedZone?.fee || 300);
        const freshDisc  = promoApplied ? Math.round(freshTotal * 0.15) : 0;
        const freshGrand = freshTotal + freshFee - freshDisc;
        setConfirmedTotal(freshGrand);

        const itemsText = cart.map((item, idx) => {
          const price = ((Number(item.finalPrice)||0) * (Number(item.qty)||1)).toLocaleString();
          const mods = item.customizations?.mods ? ` [${item.customizations.mods}]` : '';
          return `${idx+1}. ${item.name}${mods} x${item.qty} = PKR ${price}`;
        }).join(' | ');

        const address = deliveryType === 'pickup'
          ? 'Self Pickup — Branch'
          : `${deliveryForm.address}, ${deliveryForm.area}, ${deliveryForm.city}`;

        const eta = selectedZone?.eta || '30-40 min';

        // ── Email to owner ──
        emailjs.send('service_42wuj4i', 'template_67kpqkc', {
          order_id:       orderId,
          customer_name:  deliveryForm.name,
          customer_phone: deliveryForm.phone,
          customer_email: deliveryForm.email,
          address,
          payment: paymentMethod === 'cod' ? 'Cash on Delivery'
                 : paymentMethod === 'card' ? 'Credit/Debit Card'
                 : paymentMethod === 'easypaisa' ? 'EasyPaisa' : 'JazzCash',
          items:    itemsText,
          subtotal: freshTotal.toLocaleString(),
          discount: freshDisc > 0 ? freshDisc.toLocaleString() : '0',
          total:    freshGrand.toLocaleString(),
          time:     new Date().toLocaleString('en-PK', { timeZone: 'Asia/Karachi' }),
        }).then(() => console.log('Owner email sent!')).catch(e => console.error(e));

        // ── Email to customer ──
        emailjs.send('service_42wuj4i', 'template_ocgu6s5', {
          order_id:       orderId,
          customer_name:  deliveryForm.name,
          customer_email: deliveryForm.email,
          address,
          payment: paymentMethod === 'cod' ? 'Cash on Delivery'
                 : paymentMethod === 'card' ? 'Credit/Debit Card'
                 : paymentMethod === 'easypaisa' ? 'EasyPaisa' : 'JazzCash',
          items:    itemsText,
          total:    freshGrand.toLocaleString(),
          time:     new Date().toLocaleString('en-PK', { timeZone: 'Asia/Karachi' }),
        }).then(() => console.log('Customer email sent!')).catch(e => console.error(e));

        // ── WhatsApp to rider (+923261369791) ──
        if (deliveryType === 'delivery') {
          const riderMsg = encodeURIComponent(
            `🚴 NEW DELIVERY ORDER — FLARE\n\n` +
            `Order: ${orderId}\n` +
            `Customer: ${deliveryForm.name}\n` +
            `Phone: ${deliveryForm.phone}\n` +
            `Address: ${address}\n` +
            `Items: ${cart.map(i => `${i.name} x${i.qty}`).join(', ')}\n` +
            `Total: PKR ${freshGrand.toLocaleString()} (${paymentMethod === 'cod' ? 'CASH ON DELIVERY' : 'PAID'})\n` +
            `ETA: ${eta}\n` +
            `Zone: ${selectedZone?.zone || 'standard'} · Fee: PKR ${freshFee}\n\n` +
            `Pickup from: FLARE Restaurant, Shop #14, Food Street`
          );
          window.open(`https://wa.me/923261369791?text=${riderMsg}`, '_blank');
        }

        // Save to localStorage
        const order = {
          id: orderId, date: new Date().toLocaleString(),
          items: cart, total: freshGrand,
          delivery: deliveryForm, payment: paymentMethod,
          zone: selectedZone, status: 'confirmed'
        };
        try {
          const history = JSON.parse(localStorage.getItem('flare_orders') || '[]');
          localStorage.setItem('flare_orders', JSON.stringify([order, ...history]));
        } catch(e) {}

        setOrderedItems([...cart]);
        setCart([]);
        setTrackerStep(0);
        setOrderPlaced(true);
        setCheckoutStep(4);
      };
      const requireAuth = (action, msg) => {
        if (!loggedInUser) {
          setAuthTab('login');
          setAuthError('');
          setAuthSuccess('');
          setAuthRedirectMsg(msg || '');

        if (typeof action === 'function') action();
        return true;

      /* timers & scroll */
      useEffect(() => {
        const t = setInterval(() => {
          setTimeLeft(prev => {
            let { h,m,s } = prev;
            s--; if(s<0){s=59;m--;} if(m<0){m=59;h--;} if(h<0){h=23;m=59;s=59;}
            return {h,m,s};

        return () => clearInterval(t);

      const grandTotal  = cartTotal + deliveryFee - discount;

      };
      const getCustPrice = () => {
        if (!custItem) return 0;
        const cfg = customizerConfig[custItem.id];
        const sizeExtra = cfg.sizes.find(s => s.id === custSelections.size)?.price || 0;
        const toppingExtra = custSelections.toppings?.reduce((sum, tid) => {
          return sum + (cfg.toppings.find(t => t.id === tid)?.price || 0);
        }, 0) || 0;
        return custItem.price + sizeExtra + toppingExtra;
      };
      const confirmCustomizer = () => {
        const cfg = customizerConfig[custItem.id];
        const sizeLabel = cfg.sizes.find(s => s.id === custSelections.size)?.label;
        const addedToppings = custSelections.toppings.map(tid => cfg.toppings.find(t => t.id === tid)?.label);
        const mods = [
          sizeLabel !== 'Regular' ? sizeLabel : null,
