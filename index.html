          ...(custSelections.removed.map(r => `No ${r}`)),
          `Spice: ${custSelections.spice}`,
        ].filter(Boolean).join(' · ');
        const sizeExtra = cfg.sizes.find(s => s.id === custSelections.size)?.price || 0;
        const toppingExtra = custSelections.toppings.reduce((sum, tid) => sum + (cfg.toppings.find(t => t.id === tid)?.price || 0), 0);
        addToCart(custItem, { mods, extraCost: sizeExtra + toppingExtra });
        setCustItem(null);
      };

      const filters = ["All","Burgers","Chicken","Pizza","Sides","Grills"];
      const filtered = activeFilter === "All" ? menuItems : menuItems.filter(i => i.category === activeFilter);

      return (
        <>

                          </div>
                        </div>
                        <span className={`history-order-chevron ${expandedOrder===idx?'open':''}`}>▼</span>
                      </div>

                      {/* Expanded details */}
                      {expandedOrder === idx && (
                        <div className="history-order-body">
                          <div className="history-items-list">
                            {(order.items || []).map((item, i) => (
                              <div key={i} className="history-item-row">
                                <img className="history-item-img" src={item.img || 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=80&q=70'} alt={item.name} />
                                <div style={{flex:1,minWidth:0}}>
                                  <div className="history-item-name">{item.name}</div>
                                  {item.customizations?.mods && <div className="history-item-mods">{item.customizations.mods}</div>}
                                  <div className="history-item-qty">× {item.qty || 1}</div>
                                </div>
                                <div className="history-item-price">PKR {((Number(item.finalPrice)||0)*(Number(item.qty)||1)).toLocaleString()}</div>
                              </div>
                            ))}
                          </div>
                          <div className="history-order-meta">
                            <div className="history-meta-item">
                              <div className="history-meta-label">Payment</div>
                              <div className="history-meta-value">{order.payment === 'cod' ? 'Cash on Delivery' : (order.payment?.toUpperCase?.() || 'COD')}</div>
                            </div>
                            <div className="history-meta-item">
                              <div className="history-meta-label">Delivery</div>
                              <div className="history-meta-value">{order.delivery?.area ? `${order.delivery.area}, ${order.delivery.city}` : 'Home Delivery'}</div>
                            </div>
                            <div className="history-meta-item">
                              <div className="history-meta-label">Total Items</div>
                              <div className="history-meta-value">{(order.items||[]).reduce((s,i)=>s+(Number(i.qty)||1),0)} items</div>
                            </div>
                            <div className="history-meta-item">
                              <div className="history-meta-label">Order Total</div>
                              <div className="history-meta-value" style={{color:'var(--gold)'}}>PKR {Number(order.total).toLocaleString()}</div>
                            </div>
                          </div>
                          <div className="history-order-actions">
                            <button className="history-reorder-btn" onClick={() => reorderItems(order)}>🔁 Reorder</button>
                            <a className="history-support-btn"
                              href={`https://wa.me/923261369791?text=Hi%20FLARE!%20Question%20about%20order%20%23${order.id}`}
                              target="_blank" rel="noopener noreferrer">💬 Support</a>
                          </div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>

                {/* Footer */}
                {orderHistoryList.length > 0 && (
                  <div className="history-foot">
                    <div className="history-stats">
                      <div style={{textAlign:'center'}}>
                        <div className="history-stat-num">{orderHistoryList.length}</div>
                        <div className="history-stat-label">Orders</div>
                      </div>
                      <div style={{textAlign:'center'}}>
                        <div className="history-stat-num">PKR {orderHistoryTotal.toLocaleString()}</div>
                        <div className="history-stat-label">Total Spent</div>
                      </div>
                      <div style={{textAlign:'center'}}>
                        <div className="history-stat-num">{orderHistoryList.reduce((s,o)=>s+(o.items?.length||0),0)}</div>
                        <div className="history-stat-label">Items</div>
                      </div>
                    </div>
                    <button className="btn-primary" style={{padding:'10px 24px',fontSize:12}} onClick={() => { setHistoryOpen(false); document.getElementById('menu')?.scrollIntoView({behavior:'smooth'}); }}>
                      Order Again 🔥
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}

        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
