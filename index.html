<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FLARE — Premium Fast Food</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --fire: #FF4500;
      --ember: #FF6B35;
      --gold: #FFD700;
      --cream: #FFF8F0;
      --dark: #0A0805;
      --charcoal: #1A1612;
      --ash: #2D2820;
      --smoke: #4A4035;
      --muted: #8A7A6A;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-accent: 'Playfair Display', serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--cream);
      font-family: var(--font-body);
      overflow-x: hidden;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      width: 12px; height: 12px;
      background: var(--fire);
      border-radius: 50%;
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.1s ease;
      mix-blend-mode: difference;
    }
    .cursor-follower {
      width: 36px; height: 36px;
      border: 1px solid rgba(255,69,0,0.5);
      border-radius: 50%;
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9998;
      transition: transform 0.15s ease, opacity 0.3s;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--fire); border-radius: 2px; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 24px 60px;
      display: flex; align-items: center; justify-content: space-between;
      transition: background 0.4s, padding 0.4s;
    }
    nav.scrolled {
      background: rgba(10,8,5,0.95);
      backdrop-filter: blur(20px);
      padding: 16px 60px;
      border-bottom: 1px solid rgba(255,69,0,0.15);
    }
    .nav-logo {
      font-family: var(--font-display);
      font-size: 32px;
      letter-spacing: 4px;
      color: var(--cream);
      text-decoration: none;
    }
    .nav-logo span { color: var(--fire); }
    .nav-links { display: flex; gap: 40px; list-style: none; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.3s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 0; height: 1px;
      background: var(--fire);
      transition: width 0.3s;
    }
    .nav-links a:hover { color: var(--cream); }
    .nav-links a:hover::after { width: 100%; }
    .nav-cta {
      background: var(--fire);
      color: white;
      border: none;
      padding: 12px 28px;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: none;
      transition: background 0.3s, transform 0.2s;
    }
    .nav-cta:hover { background: var(--ember); transform: translateY(-1px); }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      overflow: hidden;
    }
    .hero-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 160px 60px 100px;
      position: relative;
      z-index: 2;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,69,0,0.12);
      border: 1px solid rgba(255,69,0,0.3);
      padding: 8px 20px;
      width: fit-content;
      margin-bottom: 40px;
      animation: fadeInUp 0.8s ease forwards;
    }
    .hero-badge-dot {
      width: 6px; height: 6px;
      background: var(--fire);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.5); }
    }
    .hero-badge span {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--fire);
      font-weight: 600;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(72px, 8vw, 120px);
      line-height: 0.9;
      letter-spacing: 2px;
      margin-bottom: 32px;
      animation: fadeInUp 0.8s 0.2s ease both;
    }
    .hero-title-fire { color: var(--fire); display: block; }
    .hero-title-sub {
      font-family: var(--font-accent);
      font-style: italic;
      font-size: clamp(20px, 2.5vw, 36px);
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0;
      display: block;
      margin-top: 8px;
    }
    .hero-desc {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.8;
      max-width: 420px;
      margin-bottom: 56px;
      font-weight: 300;
      animation: fadeInUp 0.8s 0.4s ease both;
    }
    .hero-actions {
      display: flex;
      gap: 20px;
      align-items: center;
      animation: fadeInUp 0.8s 0.6s ease both;
    }
    .btn-primary {
      background: var(--fire);
      color: white;
      border: none;
      padding: 18px 44px;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: none;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.15);
      transition: left 0.4s;
    }
    .btn-primary:hover::before { left: 100%; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 20px 40px rgba(255,69,0,0.4); }
    .btn-ghost {
      background: transparent;
      color: var(--cream);
      border: 1px solid rgba(255,248,240,0.2);
      padding: 18px 44px;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: none;
      transition: all 0.3s;
    }
    .btn-ghost:hover {
      border-color: var(--fire);
      color: var(--fire);
    }
    .hero-stats {
      display: flex;
      gap: 48px;
      margin-top: 72px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,248,240,0.08);
      animation: fadeInUp 0.8s 0.8s ease both;
    }
    .stat-num {
      font-family: var(--font-display);
      font-size: 42px;
      color: var(--fire);
      line-height: 1;
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .hero-right {
      position: relative;
      overflow: hidden;
    }
    .hero-img-main {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scale(1.05);
      animation: kenBurns 12s ease-in-out infinite alternate;
    }
    @keyframes kenBurns {
      from { transform: scale(1.05) translate(0,0); }
      to { transform: scale(1.12) translate(-2%, -2%); }
    }
    .hero-img-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to right, var(--dark) 0%, transparent 30%),
                  linear-gradient(to top, var(--dark) 0%, transparent 40%);
    }
    .hero-float-card {
      position: absolute;
      bottom: 80px;
      right: 40px;
      background: rgba(26,22,18,0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,69,0,0.2);
      padding: 20px 24px;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .float-card-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--fire);
      font-weight: 600;
    }
    .float-card-name {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 1px;
      margin: 6px 0 4px;
    }
    .float-card-price {
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
    }

    /* MARQUEE */
    .marquee-strip {
      background: var(--fire);
      padding: 14px 0;
      overflow: hidden;
      white-space: nowrap;
    }
    .marquee-inner {
      display: inline-block;
      animation: marquee 20s linear infinite;
    }
    .marquee-inner span {
      font-family: var(--font-display);
      font-size: 18px;
      letter-spacing: 4px;
      margin: 0 40px;
      color: white;
    }
    .marquee-dot { color: rgba(255,255,255,0.5); }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* CATEGORIES */
    .section { padding: 120px 60px; }
    .section-tag {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--fire);
      font-weight: 600;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(48px, 6vw, 80px);
      line-height: 0.95;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    .section-title em {
      font-family: var(--font-accent);
      font-style: italic;
      color: var(--fire);
    }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-top: 60px;
    }
    .cat-card {
      position: relative;
      aspect-ratio: 3/4;
      overflow: hidden;
      cursor: none;
      group: true;
    }
    .cat-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .cat-card:hover img { transform: scale(1.08); }
    .cat-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,8,5,0.95) 0%, rgba(10,8,5,0.2) 60%, transparent 100%);
      transition: background 0.4s;
    }
    .cat-card:hover .cat-overlay {
      background: linear-gradient(to top, rgba(255,69,0,0.85) 0%, rgba(10,8,5,0.4) 60%, transparent 100%);
    }
    .cat-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 24px 20px;
    }
    .cat-name {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 2px;
      display: block;
    }
    .cat-count {
      font-size: 11px;
      color: rgba(255,248,240,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
      display: block;
    }

    /* MENU */
    .menu-section { background: var(--charcoal); }
    .menu-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 60px;
    }
    .menu-filters {
      display: flex;
      gap: 8px;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid rgba(255,248,240,0.15);
      color: var(--muted);
      padding: 10px 24px;
      font-family: var(--font-body);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: none;
      transition: all 0.3s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--fire);
      border-color: var(--fire);
      color: white;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .menu-card {
      background: var(--ash);
      overflow: hidden;
      cursor: none;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.4s;
      position: relative;
    }
    .menu-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,69,0,0.3);
    }
    .menu-img-wrap {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
    }
    .menu-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.6s;
    }
    .menu-card:hover .menu-img-wrap img { transform: scale(1.06); }
    .menu-badge {
      position: absolute;
      top: 16px; left: 16px;
      background: var(--fire);
      color: white;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 12px;
    }
    .menu-badge.spicy { background: #c0392b; }
    .menu-badge.new { background: var(--gold); color: var(--dark); }
    .menu-badge.veg { background: #27ae60; }

    .menu-add-btn {
      position: absolute;
      bottom: 16px; right: 16px;
      width: 44px; height: 44px;
      background: var(--dark);
      color: var(--cream);
      border: none;
      font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      cursor: none;
      transition: all 0.3s;
      opacity: 0;
      transform: translateY(8px);
    }
    .menu-card:hover .menu-add-btn {
      opacity: 1;
      transform: translateY(0);
    }
    .menu-add-btn:hover { background: var(--fire); }

    .menu-info { padding: 24px; }
    .menu-category {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--fire);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .menu-name {
      font-family: var(--font-display);
      font-size: 26px;
      letter-spacing: 1px;
      margin-bottom: 10px;
      line-height: 1.1;
    }
    .menu-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 20px;
      font-weight: 300;
    }
    .menu-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid rgba(255,248,240,0.06);
    }
    .menu-price {
      font-size: 24px;
      font-weight: 700;
      color: var(--gold);
    }
    .menu-price span {
      font-size: 14px;
      color: var(--muted);
      text-decoration: line-through;
      margin-right: 8px;
      font-weight: 400;
    }
    .menu-rating {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    .stars { color: var(--gold); font-size: 12px; }

    /* FEATURE STRIP */
    .feature-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid rgba(255,248,240,0.06);
      border-bottom: 1px solid rgba(255,248,240,0.06);
    }
    .feature-item {
      padding: 60px 40px;
      border-right: 1px solid rgba(255,248,240,0.06);
      text-align: center;
      transition: background 0.3s;
    }
    .feature-item:last-child { border-right: none; }
    .feature-item:hover { background: rgba(255,69,0,0.05); }
    .feature-icon {
      font-size: 36px;
      margin-bottom: 20px;
      display: block;
    }
    .feature-title {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
    .feature-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      font-weight: 300;
    }

    /* SPECIALS */
    .specials-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      margin-top: 60px;
    }
    .special-card {
      position: relative;
      height: 500px;
      overflow: hidden;
      cursor: none;
    }
    .special-card:first-child { grid-row: span 2; height: 100%; }
    .special-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .special-card:hover img { transform: scale(1.06); }
    .special-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,8,5,0.9) 0%, transparent 60%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 40px;
      transition: background 0.4s;
    }
    .special-card:hover .special-overlay {
      background: linear-gradient(to top, rgba(255,69,0,0.8) 0%, transparent 70%);
    }
    .special-tag {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 12px;
    }
    .special-name {
      font-family: var(--font-display);
      font-size: 36px;
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 12px;
    }
    .special-price {
      font-size: 22px;
      font-weight: 700;
      color: var(--gold);
    }

    /* TESTIMONIALS */
    .testimonials-section { background: var(--charcoal); }
    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-top: 60px;
    }
    .testimonial-card {
      background: var(--ash);
      padding: 40px;
      position: relative;
      transition: transform 0.3s;
    }
    .testimonial-card:hover { transform: translateY(-4px); }
    .testimonial-card::before {
      content: '"';
      font-family: var(--font-accent);
      font-size: 120px;
      color: rgba(255,69,0,0.1);
      position: absolute;
      top: -10px; left: 20px;
      line-height: 1;
    }
    .testimonial-text {
      font-size: 15px;
      line-height: 1.8;
      color: rgba(255,248,240,0.8);
      margin-bottom: 32px;
      font-weight: 300;
      font-style: italic;
      position: relative;
      z-index: 1;
    }
    .testimonial-author {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .author-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--fire);
    }
    .author-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 2px;
    }
    .author-role {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* CTA */
    .cta-section {
      padding: 140px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .cta-bg {
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1600&q=80') center/cover;
    }
    .cta-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(10,8,5,0.85);
    }
    .cta-content { position: relative; z-index: 1; }
    .cta-title {
      font-family: var(--font-display);
      font-size: clamp(56px, 7vw, 100px);
      letter-spacing: 4px;
      line-height: 0.95;
      margin-bottom: 24px;
    }
    .cta-title em {
      color: var(--fire);
      font-family: var(--font-accent);
      font-style: italic;
    }
    .cta-subtitle {
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 56px;
      font-weight: 300;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    .cta-actions {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    /* FOOTER */
    footer {
      background: var(--dark);
      border-top: 1px solid rgba(255,248,240,0.06);
      padding: 80px 60px 40px;
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 60px;
      margin-bottom: 60px;
    }
    .footer-brand-name {
      font-family: var(--font-display);
      font-size: 40px;
      letter-spacing: 4px;
      margin-bottom: 16px;
    }
    .footer-brand-name span { color: var(--fire); }
    .footer-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 32px;
      font-weight: 300;
    }
    .footer-social {
      display: flex;
      gap: 12px;
    }
    .social-btn {
      width: 40px; height: 40px;
      border: 1px solid rgba(255,248,240,0.12);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      font-size: 16px;
      text-decoration: none;
      cursor: none;
      transition: all 0.3s;
    }
    .social-btn:hover { border-color: var(--fire); color: var(--fire); background: rgba(255,69,0,0.1); }
    .footer-col-title {
      font-family: var(--font-display);
      font-size: 16px;
      letter-spacing: 3px;
      margin-bottom: 24px;
      color: var(--cream);
    }
    .footer-links { list-style: none; }
    .footer-links li { margin-bottom: 12px; }

    /* CART BUBBLE */
    .cart-bubble {
      position: fixed;
      bottom: 40px; right: 40px;
      width: 60px; height: 60px;
      background: var(--fire);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;

      transition: transform 0.3s;

      position: absolute;
      top: -4px; right: -4px;

      color: var(--dark);
      border-radius: 50%;
      font-size: 11px;
      font-weight: 800;
      display: flex; align-items: center; justify-content: center;

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 120px; right: 40px;
      background: var(--ash);
      border: 1px solid rgba(255,69,0,0.3);
      padding: 16px 24px;
      display: flex; align-items: center; gap: 12px;
      z-index: 300;
      animation: slideIn 0.4s ease;

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }

    }

    .cart-drawer-foot {

    }
    .cart-subtotal-row {

    }
    .cart-total-row {

    .cart-total-label {

    }

    .checkout-btn {

    .cart-note {

    /* ===================== LOGIN MODAL ===================== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      z-index: 600;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      animation: fadeOverlay 0.3s ease;
    }
    .auth-modal {
      background: var(--charcoal);
      width: 100%; max-width: 460px;
      border: 1px solid rgba(255,69,0,0.2);
      position: relative;
      animation: modalPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
      overflow: hidden;
    }
    @keyframes modalPop {
      from { opacity:0; transform: scale(0.88) translateY(20px); }
      to { opacity:1; transform: scale(1) translateY(0); }
    }
    .auth-modal-top {
      background: linear-gradient(135deg, var(--fire) 0%, #c0392b 100%);
      padding: 40px 40px 32px;
      position: relative;
    }
    .auth-modal-logo {
      font-family: var(--font-display);
      font-size: 36px; letter-spacing: 4px;
      color: white; margin-bottom: 8px;
    }
    .auth-modal-logo span { color: var(--gold); }
    .auth-modal-tagline {
      font-size: 13px; color: rgba(255,255,255,0.75);
      font-weight: 300;
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.15);
      border: none; color: white;
      font-size: 18px; cursor: none;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.3); }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,248,240,0.07);
    }
    .auth-tab {
      flex: 1; padding: 18px;
      background: transparent; border: none; color: var(--muted);
      font-family: var(--font-body); font-weight: 600;
      font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
      cursor: none; transition: all 0.2s;
      border-bottom: 2px solid transparent;
    }
    .auth-tab.active { color: var(--fire); border-bottom-color: var(--fire); }

    .auth-body { padding: 32px 40px 40px; }
    .auth-field { margin-bottom: 20px; }
    .auth-label {
      display: block; font-size: 11px;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); font-weight: 600;
      margin-bottom: 8px;
    }
    .auth-input {
      width: 100%; padding: 14px 18px;
      background: var(--ash);
      border: 1px solid rgba(255,248,240,0.08);
      color: var(--cream); font-family: var(--font-body);
      font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--fire); }
    .auth-input::placeholder { color: var(--smoke); }
    .auth-submit {
      width: 100%; padding: 16px;
      background: var(--fire); color: white; border: none;
      font-family: var(--font-body); font-weight: 700;
      font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
      cursor: none; transition: all 0.3s; margin-top: 8px;
    }
    .auth-submit:hover { background: var(--ember); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,69,0,0.4); }
    .auth-divider {
      text-align: center; margin: 20px 0;
      font-size: 12px; color: var(--smoke);
      position: relative;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      position: absolute; top: 50%;
      width: 40%; height: 1px;
      background: rgba(255,248,240,0.07);
    }
    .auth-divider::before { left: 0; }
    .auth-divider::after { right: 0; }
    .auth-social-btns { display: flex; gap: 12px; }
    .auth-social-btn {
      flex: 1; padding: 12px;
      background: var(--ash);
      border: 1px solid rgba(255,248,240,0.08);
      color: var(--cream); font-family: var(--font-body);
      font-size: 13px; cursor: none;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: border-color 0.2s;
    }
    .auth-social-btn:hover { border-color: rgba(255,248,240,0.25); }
    .auth-switch {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: var(--muted);
    }
    .auth-switch span {
      color: var(--fire); cursor: none; font-weight: 600;
      text-decoration: underline;
    }
    .auth-perks {
      display: flex; gap: 16px; flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .auth-perk {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
    }
    .auth-perk-icon { color: var(--gold); }

    /* ===================== CUSTOMIZER MODAL ===================== */
    .customizer-modal {
      background: var(--charcoal);
      width: 100%; max-width: 560px;
      max-height: 90vh;
      border: 1px solid rgba(255,69,0,0.2);
      position: relative;
      overflow: hidden;
      display: flex; flex-direction: column;
      animation: modalPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .cust-img {
      width: 100%; height: 200px;
      object-fit: cover; flex-shrink: 0;
    }
    .cust-head {
      padding: 24px 32px 0;
      flex-shrink: 0;
    }
    .cust-name {
      font-family: var(--font-display);
      font-size: 32px; letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .cust-base-price { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
    .cust-body { padding: 0 32px 24px; overflow-y: auto; flex: 1; }
    .cust-body::-webkit-scrollbar { width: 3px; }
    .cust-body::-webkit-scrollbar-thumb { background: var(--fire); }
    .cust-section { margin-bottom: 28px; }
    .cust-section-title {
      font-family: var(--font-display);
      font-size: 16px; letter-spacing: 2px;
      color: var(--cream); margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,248,240,0.07);
      display: flex; align-items: center; gap: 10px;
    }
    .cust-section-note {
      font-size: 10px; font-family: var(--font-body);
      color: var(--muted); letter-spacing: 1px; font-weight: 400;
      text-transform: uppercase;
    }
    .cust-options { display: flex; flex-wrap: wrap; gap: 8px; }
    .cust-option {
      padding: 8px 18px;
      border: 1px solid rgba(255,248,240,0.12);
      color: var(--muted); font-size: 13px;
      cursor: none; transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
      background: transparent;
      font-family: var(--font-body);
    }
    .cust-option.selected {
      border-color: var(--fire);
      color: var(--cream);
      background: rgba(255,69,0,0.12);
    }
    .cust-option.removed {
      border-color: #e74c3c;
      color: #e74c3c;
      background: rgba(231,76,60,0.08);
      text-decoration: line-through;
    }
    .cust-option-price {
      font-size: 11px; color: var(--fire);
      font-weight: 600;
    }
    .cust-option.selected .cust-option-price { color: var(--gold); }
    .cust-foot {
      padding: 20px 32px;
      border-top: 1px solid rgba(255,248,240,0.07);
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
      background: var(--charcoal);
    }
    .cust-total { }
    .cust-total-label {
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 2px;
    }
    .cust-total-price {
      font-family: var(--font-display); font-size: 28px;
      color: var(--gold); letter-spacing: 1px;
    }
    .cust-add-btn {
      background: var(--fire); color: white; border: none;
      padding: 16px 32px; font-family: var(--font-body);
      font-weight: 700; font-size: 13px; letter-spacing: 2px;
      text-transform: uppercase; cursor: none; transition: all 0.3s;
    }
    .cust-add-btn:hover { background: var(--ember); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,69,0,0.4); }

    /* ===================== BLOG SECTION ===================== */
    .blog-section { background: var(--dark); }
    .blog-grid {
      display: grid;
      grid-template-columns: 1.6fr 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 24px;
      margin-top: 60px;
    }
    .blog-card {
      background: var(--charcoal);
      overflow: hidden; cursor: none;
      transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.4s;
      display: flex; flex-direction: column;
    }
    .blog-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }
    .blog-card.featured { grid-row: span 2; }
    .blog-img-wrap { position: relative; overflow: hidden; }
    .blog-card.featured .blog-img-wrap { height: 340px; }
    .blog-card:not(.featured) .blog-img-wrap { height: 180px; }
    .blog-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
    .blog-card:hover .blog-img { transform: scale(1.06); }
    .blog-cat-tag {
      position: absolute; top: 16px; left: 16px;
      background: var(--fire); color: white;
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 4px 12px;
    }
    .blog-body { padding: 24px; flex: 1; display: flex; flex-direction: column; }
    .blog-meta {
      font-size: 11px; color: var(--smoke);
      letter-spacing: 1px; margin-bottom: 10px;
    }
    .blog-title {
      font-family: var(--font-display);
      letter-spacing: 1px; line-height: 1.1;
      margin-bottom: 10px;
    }
    .blog-card.featured .blog-title { font-size: 28px; }
    .blog-card:not(.featured) .blog-title { font-size: 20px; }
    .blog-excerpt {
      font-size: 13px; color: var(--muted);
      line-height: 1.7; font-weight: 300;
      flex: 1;
    }
    .blog-card:not(.featured) .blog-excerpt { display: none; }
    .blog-read-more {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--fire); font-size: 12px;
      font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; text-decoration: none;
      margin-top: 16px; cursor: none;
      transition: gap 0.2s;
    }
    .blog-read-more:hover { gap: 14px; }

    /* ======================================================
       FULL RESPONSIVE SYSTEM — Mobile · Tablet · Desktop
    ====================================================== */

    /* ── MOBILE HAMBURGER MENU STATE ── */
    .mobile-menu-open { overflow: hidden; }
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: none;
      padding: 4px;
      z-index: 201;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 2px;
      background: var(--cream);
      transition: all 0.3s;
    }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    .mobile-nav-drawer {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--dark);
      z-index: 200;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 80px 32px 40px;
      animation: slideDrawer 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .mobile-nav-link {
      font-family: var(--font-display);
      font-size: 40px;
      letter-spacing: 4px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      text-align: center;
      display: block;
      padding: 8px 0;
      width: 100%;
      border-bottom: 1px solid rgba(255,248,240,0.05);
    }
    .mobile-nav-link:hover, .mobile-nav-link:active { color: var(--fire); }
    .mobile-nav-actions {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      width: 100%;
    }
    .mobile-nav-actions button { flex: 1; }

    /* ── TABLET: 601px – 1024px ── */
    @media (max-width: 1024px) {
      nav { padding: 20px 32px; }
      nav.scrolled { padding: 14px 32px; }
      .nav-links { gap: 24px; }
      .nav-links a { font-size: 11px; }
      .section { padding: 80px 32px; }
      .hero-left { padding: 140px 32px 80px; }
      .hero-title { font-size: clamp(60px, 7vw, 100px); }
      .menu-grid { grid-template-columns: repeat(2, 1fr); }
      .categories-grid { grid-template-columns: repeat(3, 1fr); }
      .deals-grid { grid-template-columns: repeat(2, 1fr); }
      .eid-deals-grid { grid-template-columns: repeat(2, 1fr); }
      .blog-grid { grid-template-columns: 1fr 1fr; }
      .blog-card.featured { grid-column: span 2; }
      .footer-grid { grid-template-columns: 1fr 1fr; gap: 40px; }
      .feature-strip { grid-template-columns: repeat(2, 1fr); }
      .feature-item:nth-child(2) { border-right: none; }
      .feature-item:nth-child(3) { border-top: 1px solid rgba(255,248,240,0.06); }
      .feature-item:nth-child(4) { border-top: 1px solid rgba(255,248,240,0.06); border-right: none; }
      .specials-grid { grid-template-columns: 1fr; }
      .special-card:first-child { grid-row: auto; height: 400px; }
      .testimonials-grid { grid-template-columns: 1fr 1fr; }
      .testimonials-grid .testimonial-card:last-child { grid-column: span 2; }
      .cta-section { padding: 100px 32px; }
      footer { padding: 60px 32px 32px; }
      .eid-hero-banner { padding: 40px 32px; gap: 24px; }
      .eid-pill-num { font-size: 60px; }
    }

    /* ── MOBILE: ≤ 600px ── */
    @media (max-width: 600px) {
      /* cursor off on touch */
      body { cursor: auto; }
      .cursor, .cursor-follower { display: none; }

      /* NAV — hamburger */
      nav { padding: 16px 20px; }
      nav.scrolled { padding: 12px 20px; }
      .nav-links { display: none; }
      .nav-desktop-actions { display: none; }
      .hamburger { display: flex; }

      /* HERO — single column */
      .hero { grid-template-columns: 1fr; min-height: 100svh; }
      .hero-right { display: none; }
      .hero-left {
        padding: 100px 20px 60px;
        background: linear-gradient(to bottom, rgba(10,8,5,0.3) 0%, var(--dark) 100%),
                    url('https://images.unsplash.com/photo-1550547660-d9450f859349?w=800&q=70') center/cover no-repeat;
      }
      .hero-title { font-size: clamp(52px, 14vw, 80px); }
      .hero-title-sub { font-size: 18px; }
      .hero-desc { font-size: 14px; margin-bottom: 36px; }
      .hero-actions { flex-direction: column; gap: 12px; }
      .hero-actions .btn-primary,
      .hero-actions .btn-ghost { width: 100%; text-align: center; padding: 16px 24px; }
      .hero-stats { gap: 24px; margin-top: 48px; padding-top: 28px; }
      .stat-num { font-size: 32px; }
      .hero-badge { margin-bottom: 28px; }

      /* MARQUEE */
      .marquee-inner span { font-size: 14px; margin: 0 20px; }

      /* SECTIONS */
      .section { padding: 60px 20px; }
      .section-title { font-size: clamp(36px, 10vw, 56px); }

      /* CATEGORIES */
      .categories-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .cat-name { font-size: 16px; }

      /* FEATURES */
      .feature-strip { grid-template-columns: 1fr 1fr; }
      .feature-item { padding: 32px 20px; border-right: none; }
      .feature-item:nth-child(odd) { border-right: 1px solid rgba(255,248,240,0.06); }
      .feature-item:nth-child(3),
      .feature-item:nth-child(4) { border-top: 1px solid rgba(255,248,240,0.06); }
      .feature-icon { font-size: 28px; margin-bottom: 12px; }
      .feature-title { font-size: 16px; }
      .feature-desc { font-size: 12px; }

      /* MENU */
      .menu-header { flex-direction: column; align-items: flex-start; gap: 20px; margin-bottom: 32px; }
      .menu-filters { flex-wrap: wrap; gap: 6px; }
      .filter-btn { padding: 8px 14px; font-size: 10px; letter-spacing: 1px; }
      .menu-grid { grid-template-columns: 1fr; gap: 16px; }
      .menu-add-btn { opacity: 1; transform: translateY(0); }
      .menu-name { font-size: 22px; }
      .menu-info { padding: 16px; }

      /* DEALS */
      .deals-timer-bar { padding: 12px 20px; flex-direction: column; gap: 10px; }
      .deals-timer-label { font-size: 10px; text-align: center; }
      .timer-num { font-size: 20px; }
      .deals-grid { grid-template-columns: 1fr; gap: 16px; }
      .deal-card { }
      .deal-body { padding: 16px; }
      .deal-name { font-size: 22px; }
      .deals-banner { grid-template-columns: 1fr; padding: 28px 20px; text-align: center; gap: 24px; }
      .banner-divider { display: none; }
      .banner-title { font-size: 28px; }
      .banner-code { font-size: 28px; letter-spacing: 4px; padding: 12px 20px; }

      /* EID */
      .eid-hero-banner { grid-template-columns: 1fr; padding: 32px 20px; gap: 24px; text-align: center; }
      .eid-banner-title { font-size: clamp(32px, 9vw, 52px); }
      .eid-banner-sub { font-size: 13px; }
      .eid-discount-pill { padding: 20px 28px; display: inline-block; }
      .eid-pill-num { font-size: 64px; }
      .eid-deals-grid { grid-template-columns: 1fr; gap: 16px; }
      .eid-card-body { padding: 16px; }
      .eid-card-name { font-size: 22px; }
      .eid-ends-strip { flex-direction: column; padding: 20px; text-align: center; gap: 8px; }

      /* SPECIALS */
      .specials-grid { grid-template-columns: 1fr; gap: 12px; }
      .special-card { height: 260px; }
      .special-card:first-child { height: 260px; grid-row: auto; }
      .special-name { font-size: 26px; }
      .special-overlay { padding: 20px; }

      /* BLOG */
      .blog-grid { grid-template-columns: 1fr; gap: 16px; }
      .blog-card.featured { grid-row: auto; grid-column: auto; }
      .blog-card.featured .blog-img-wrap { height: 220px; }
      .blog-card:not(.featured) .blog-img-wrap { height: 160px; }
      .blog-title { font-size: 18px !important; }

      /* TESTIMONIALS */
      .testimonials-grid { grid-template-columns: 1fr; gap: 16px; }
      .testimonials-grid .testimonial-card:last-child { grid-column: auto; }
      .testimonial-card { padding: 28px 20px; }

      /* CTA */
      .cta-section { padding: 80px 20px; }
      .cta-subtitle { font-size: 15px; }
      .cta-actions { flex-direction: column; align-items: stretch; gap: 12px; }
      .cta-actions .btn-primary,
      .cta-actions .btn-ghost { font-size: 14px; padding: 16px 24px; }

      /* FOOTER */
      footer { padding: 48px 20px 28px; }
      .footer-grid { grid-template-columns: 1fr; gap: 32px; }
      .footer-brand-name { font-size: 32px; }
      .footer-bottom { flex-direction: column; gap: 8px; text-align: center; }

      /* CART DRAWER */
      .cart-drawer { width: 100%; border-left: none; border-top: 1px solid rgba(255,69,0,0.2); }
      .cart-drawer-head { padding: 20px; }
      .cart-items-list { padding: 16px 20px; }
      .cart-drawer-foot { padding: 16px 20px; }
      .cart-bubble { bottom: 20px; right: 20px; width: 52px; height: 52px; font-size: 20px; }

      /* AUTH MODAL */
      .modal-overlay { padding: 0; align-items: flex-end; }
      .auth-modal { max-width: 100%; border-radius: 0; border-bottom: none;
        border-left: none; border-right: none;
        animation: slideUp 0.35s cubic-bezier(0.25,0.46,0.45,0.94); }
      @keyframes slideUp {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .auth-modal-top { padding: 24px 20px 20px; }
      .auth-body { padding: 20px; max-height: 70svh; overflow-y: auto; }
      .auth-modal-logo { font-size: 28px; }
      .auth-social-btns { flex-direction: column; }

      /* CUSTOMIZER */
      .modal-overlay.cust-overlay { align-items: flex-end; padding: 0; }
      .customizer-modal {
        max-width: 100%; max-height: 92svh;
        animation: slideUp 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
      }
      .cust-img { height: 160px; }
      .cust-head { padding: 16px 20px 0; }

        setAuthError(''); setAuthSuccess('');

        if (!email.trim() || !email.includes('@')) return setAuthError('Please enter a valid email address.');
        if (!phone.trim()) return setAuthError('Please enter your phone number.');
        if (password.length < 6) return setAuthError('Password must be at least 6 characters.');
        const accounts = getAccounts();
        if (accounts.find(a => a.email.toLowerCase() === email.toLowerCase())) {
          return setAuthError('An account with this email already exists. Please sign in.');

        const newUser = { name, email: email.toLowerCase(), phone, password, joinedAt: new Date().toLocaleDateString() };

          {/* ── AUTH MODAL ── */}
          {authOpen && (
            <div className="modal-overlay" onClick={e => { if(e.target===e.currentTarget) { setAuthOpen(false); setAuthError(''); setAuthSuccess(''); setAuthRedirectMsg(''); } }}>
              <div className="auth-modal">
                <div className="auth-modal-top">
                  <div className="auth-modal-logo">FL<span>A</span>RE</div>
                  <div className="auth-modal-tagline">
                    {authTab === 'login' ? 'Sign in to your FLARE account.' : 'Join the fire. Unlock exclusive deals & rewards.'}
                  </div>
                  <button className="modal-close" onClick={() => { setAuthOpen(false); setAuthError(''); setAuthSuccess(''); setAuthRedirectMsg(''); }}>✕</button>
                </div>
                <div className="auth-tabs">
                  <button className={`auth-tab ${authTab==='login'?'active':''}`} onClick={() => { setAuthTab('login'); setAuthError(''); setAuthSuccess(''); }}>Sign In</button>
                  <button className={`auth-tab ${authTab==='signup'?'active':''}`} onClick={() => { setAuthTab('signup'); setAuthError(''); setAuthSuccess(''); }}>Create Account</button>
                </div>
                <div className="auth-body">

                  {/* REDIRECT HINT */}
                  {authRedirectMsg && !authSuccess && (
                    <div style={{background:'rgba(255,69,0,0.1)',border:'1px solid rgba(255,69,0,0.35)',padding:'12px 16px',marginBottom:20,display:'flex',alignItems:'center',gap:10,borderRadius:0}}>
                      <span style={{fontSize:18}}>🔒</span>
                      <span style={{fontSize:13,color:'var(--ember)',fontWeight:500}}>{authRedirectMsg}</span>
                    </div>
                  )}

                  {/* SUCCESS MESSAGE */}
                  {authSuccess && (
                    <div style={{background:'rgba(39,174,96,0.12)',border:'1px solid rgba(39,174,96,0.4)',padding:'12px 16px',marginBottom:20,display:'flex',alignItems:'center',gap:10}}>
                      <span style={{fontSize:18}}>✅</span>
                      <span style={{fontSize:14,fontWeight:600,color:'#2ecc71'}}>{authSuccess}</span>
                    </div>
                  )}

                  {/* ERROR MESSAGE */}
                  {authError && (
                    <div style={{background:'rgba(231,76,60,0.12)',border:'1px solid rgba(231,76,60,0.4)',padding:'12px 16px',marginBottom:20,display:'flex',alignItems:'center',gap:10}}>
                      <span style={{fontSize:18}}>⚠️</span>
                      <span style={{fontSize:13,color:'#e74c3c'}}>{authError}</span>
                    </div>
                  )}

                  {/* ── SIGN UP FORM ── */}
                  {authTab === 'signup' && (
                    <>
                      <div className="auth-perks">
                        {[['🔥','Exclusive deals'],['⭐','Earn reward points'],['🚀','Faster checkout'],['🎁','Birthday surprise']].map(([icon,label]) => (
                          <div key={label} className="auth-perk"><span className="auth-perk-icon">{icon}</span>{label}</div>
                        ))}
                      </div>
                      <div className="auth-field">
                        <label className="auth-label">Full Name</label>
                        <input className="auth-input" type="text" placeholder="Your full name"
                          value={signupForm.name}
                          onChange={e => setSignupForm(p=>({...p, name:e.target.value}))} />
                      </div>
                      <div className="auth-field">
                        <label className="auth-label">Email Address</label>
                        <input className="auth-input" type="email" placeholder="you@example.com"
                          value={signupForm.email}
                          onChange={e => setSignupForm(p=>({...p, email:e.target.value}))} />
                      </div>
                      <div className="auth-field">
                        <label className="auth-label">Password</label>
                        <input className="auth-input" type="password" placeholder="Min. 6 characters"
                          value={signupForm.password}
                          onChange={e => setSignupForm(p=>({...p, password:e.target.value}))} />
                      </div>
                      <div className="auth-field">
                        <label className="auth-label">Phone Number</label>
                        <input className="auth-input" type="tel" placeholder="+92 300 0000000"
                          value={signupForm.phone}
                          onChange={e => setSignupForm(p=>({...p, phone:e.target.value}))} />
                      </div>
                      <button className="auth-submit" onClick={handleSignup}>
                        Create My Account
                      </button>
                      <div className="auth-switch">
                        Already have an account? <span onClick={() => { setAuthTab('login'); setAuthError(''); }}>Sign in</span>
                      </div>
                    </>
                  )}

                  {/* ── SIGN IN FORM ── */}
                  {authTab === 'login' && (
                    <>
                      <div className="auth-field">
                        <label className="auth-label">Email Address</label>
                        <input className="auth-input" type="email" placeholder="you@example.com"
                          value={loginForm.email}
                          onChange={e => setLoginForm(p=>({...p, email:e.target.value}))}
                          onKeyDown={e => e.key==='Enter' && handleLogin()} />
                      </div>
                      <div className="auth-field">
                        <label className="auth-label">Password</label>
                        <input className="auth-input" type="password" placeholder="••••••••"
                          value={loginForm.password}
                          onChange={e => setLoginForm(p=>({...p, password:e.target.value}))}
                          onKeyDown={e => e.key==='Enter' && handleLogin()} />
                      </div>
                      <button className="auth-submit" onClick={handleLogin}>
                        Sign In to FLARE
                      </button>
                      <div style={{textAlign:'center',marginTop:12}}>
                        <span style={{fontSize:12,color:'var(--fire)',cursor:'none',fontWeight:600,letterSpacing:1}}>Forgot password?</span>
                      </div>
                      <div className="auth-switch" style={{marginTop:16}}>
                        New to FLARE? <span onClick={() => { setAuthTab('signup'); setAuthError(''); }}>Create an account</span>
                      </div>
                      <div style={{marginTop:20,padding:'14px 16px',background:'rgba(255,248,240,0.03)',border:'1px solid rgba(255,248,240,0.07)'}}>
                        <div style={{fontSize:11,color:'var(--smoke)',letterSpacing:2,textTransform:'uppercase',marginBottom:8,fontWeight:600}}>🔐 Registered Accounts</div>
                        {getAccounts().length === 0 ? (
                          <div style={{fontSize:12,color:'var(--smoke)'}}>No accounts yet. <span style={{color:'var(--fire)',cursor:'none'}} onClick={() => setAuthTab('signup')}>Sign up first →</span></div>
                        ) : getAccounts().map(a => (
                          <div key={a.email} style={{fontSize:12,color:'var(--muted)',padding:'4px 0',borderBottom:'1px solid rgba(255,248,240,0.04)',display:'flex',alignItems:'center',gap:8}}>
                            <span style={{width:22,height:22,borderRadius:'50%',background:'var(--ash)',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'var(--fire)',flexShrink:0}}>{a.name.charAt(0).toUpperCase()}</span>
                            <span style={{fontWeight:500}}>{a.name}</span>
                            <span style={{color:'var(--smoke)',marginLeft:'auto'}}>{a.email}</span>
                          </div>
                        ))}
                      </div>
                    </>
                  )}

                </div>
              </div>
            </div>
          )}

          {/* ── CUSTOMIZER MODAL ── */}
          {custItem && customizerConfig[custItem.id] && (
            <div className="modal-overlay cust-overlay" onClick={e => { if(e.target===e.currentTarget) setCustItem(null); }}>
              <div className="customizer-modal">
                <img className="cust-img" src={custItem.img} alt={custItem.name} />
                <button className="modal-close" style={{position:'absolute',top:16,right:16,background:'rgba(0,0,0,0.6)',border:'none',color:'white',width:36,height:36,cursor:'none',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={() => setCustItem(null)}>✕</button>
                <div className="cust-head">
                  <div className="cust-name">{custItem.name}</div>
                  <div className="cust-base-price">Base price: PKR {custItem.price} · Customise below</div>
                </div>
                <div className="cust-body">
                  {/* SIZE */}
                  <div className="cust-section">
                    <div className="cust-section-title">SIZE <span className="cust-section-note">choose one</span></div>
                    <div className="cust-options">
                      {customizerConfig[custItem.id].sizes.map(s => (
                        <button key={s.id} className={`cust-option ${custSelections.size===s.id?'selected':''}`} onClick={() => setCustSelections(p=>({...p,size:s.id}))}>
                          {s.label}{s.price > 0 && <span className="cust-option-price">+{s.price}</span>}
                        </button>
                      ))}
                    </div>
                  </div>
                  {/* TOPPINGS */}
                  <div className="cust-section">
                    <div className="cust-section-title">ADD TOPPINGS <span className="cust-section-note">optional</span></div>
                    <div className="cust-options">
                      {customizerConfig[custItem.id].toppings.map(t => (
                        <button key={t.id} className={`cust-option ${custSelections.toppings?.includes(t.id)?'selected':''}`} onClick={() => toggleTopping(t.id)}>
                          {t.label}<span className="cust-option-price">+{t.price}</span>
                        </button>
                      ))}
                    </div>
                  </div>
                  {/* REMOVE */}
                  <div className="cust-section">
                    <div className="cust-section-title">REMOVE INGREDIENTS <span className="cust-section-note">optional</span></div>
                    <div className="cust-options">
                      {customizerConfig[custItem.id].removables.map(r => (
                        <button key={r} className={`cust-option ${custSelections.removed?.includes(r)?'removed':''}`} onClick={() => toggleRemove(r)}>
                          {custSelections.removed?.includes(r) ? '✕ ' : ''}{r}
                        </button>
                      ))}
                    </div>
                  </div>
                  {/* SPICE */}
                  <div className="cust-section">
                    <div className="cust-section-title">SPICE LEVEL <span className="cust-section-note">choose one</span></div>
                    <div className="cust-options">
                      {customizerConfig[custItem.id].spice.map(sp => (
                        <button key={sp} className={`cust-option ${custSelections.spice===sp?'selected':''}`} onClick={() => setCustSelections(p=>({...p,spice:sp}))}>
                          {sp}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="cust-foot">
                  <div className="cust-total">
                    <div className="cust-total-label">Your Total</div>
                    <div className="cust-total-price">PKR {getCustPrice().toLocaleString()}</div>
                  </div>
                  <button className="cust-add-btn" onClick={confirmCustomizer}>Add to Cart →</button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
